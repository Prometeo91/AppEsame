  let known=0;cards.forEach(c=>{if(S.cardProg[c.id]&&S.cardProg[c.id].status==='known')known++;});
  return{total:cards.length,known,pct:Math.round(known/cards.length*100)};
}
function subtopicStats(h3s){
  const cards=S.cards.filter(c=>h3s.includes(c.subtopic));if(!cards.length)return{total:0,pct:0,quizPct:null};
  let known=0;cards.forEach(c=>{if(S.cardProg[c.id]&&S.cardProg[c.id].status==='known')known++;});
  return{total:cards.length,pct:Math.round(known/cards.length*100),quizPct:null};
}
function getErrCards(){return Object.keys(S.wrongAns).filter(id=>{const w=S.wrongAns[id];return w&&w.cc<2;}).map(id=>S.cards.find(c=>c.id===parseInt(id))).filter(Boolean);}

/* WEAK SPOTS */
function getWeakSpots(){
  // Count wrong answers per domain from quiz history
  const domainWrongs={1:0,2:0,3:0};
  const domainTotals={1:0,2:0,3:0};
  // Analyze all quiz history answers
  S.quizHist.forEach(h=>{
    if(!h.answers)return;
    Object.entries(h.answers).forEach(([qid,correct])=>{
      // Try to determine domain from question ID
      let d=0;
      if(qid.startsWith('A')||qid.startsWith('D1')||qid.startsWith('D2')||qid.startsWith('D3')||qid.startsWith('D4')||qid.startsWith('D5')||qid.startsWith('D6')||qid.startsWith('D7')||qid.startsWith('D8'))d=1;
      else if(qid.startsWith('G1')||qid.startsWith('G2')||qid.startsWith('G3')||qid.startsWith('G4')||qid.startsWith('G5')||qid.startsWith('G6')||qid.startsWith('G8')||qid.startsWith('G9'))d=1;
      else if(qid.startsWith('B')||qid.startsWith('E')||qid.startsWith('G7')||qid.startsWith('G1')||qid.startsWith('H'))d=2;
      else if(qid.startsWith('C')||qid.startsWith('F'))d=3;
      // Use qWrongHistory for more accurate tracking
    });
  });
  // Better approach: use qWrongHistory which tracks question IDs with wrong count
  const subtopicErrors={};
  // Map question domains to subtopics
  const allSubtopics=[];
  [1,2,3].forEach(dom=>{
    (SUBTOPICS[dom]||[]).forEach(st=>{
      allSubtopics.push({...st,domain:dom});
    });
  });
  // Count errors per subtopic from flashcard wrong answers
  Object.entries(S.wrongAns).forEach(([cardIdStr,info])=>{
    const cardId=parseInt(cardIdStr);
    const card=S.cards.find(c=>c.id===cardId);
    if(!card)return;
    allSubtopics.forEach(st=>{
      if(st.h3s.includes(card.subtopic)){
        if(!subtopicErrors[st.id])subtopicErrors[st.id]={id:st.id,name:st.name,domain:st.domain,errors:0,total:0};
        subtopicErrors[st.id].errors++;
      }
    });
  });
  // Count errors from quiz wrong history
  Object.entries(S.qWrongHistory).forEach(([qid,count])=>{
    // Try to find the question's domain
    let d=0;
    const q=[...convertItQuestions(),...convertItH(),...convertItF()].find(qq=>qq.id===qid);
    if(q)d=q.domain;
    if(d){
      const sts=SUBTOPICS[d]||[];
      // Distribute among subtopics of that domain proportionally
      if(sts.length){
        const st=sts[Math.floor(Math.random()*sts.length)];// approximate
        const key=st.id;
        if(!subtopicErrors[key])subtopicErrors[key]={id:st.id,name:st.name,domain:d,errors:0,total:0};
        subtopicErrors[key].errors+=count;
      }
    }
  });
  // Also count from flashcard progress
  allSubtopics.forEach(st=>{
    const cards=S.cards.filter(c=>st.h3s.includes(c.subtopic));
    if(!subtopicErrors[st.id])subtopicErrors[st.id]={id:st.id,name:st.name,domain:st.domain,errors:0,total:cards.length};
    else subtopicErrors[st.id].total=cards.length;
    // Count review cards as weak
    cards.forEach(c=>{
      const p=S.cardProg[c.id];
      if(p&&p.status==='review'){
        subtopicErrors[st.id].errors++;
      }
    });
  });
  // Sort by error count and return top 5
  return Object.values(subtopicErrors)
    .filter(s=>s.errors>0)
    .sort((a,b)=>b.errors-a.errors)
    .slice(0,5);
}

/* SVG */
function svgC(pct,sz,col,lbl){
  const r=(sz-6)/2,c=2*Math.PI*r;
  return`<div class="prog-ring" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="5"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${c*pct/100} ${c}" stroke-linecap="round"/></svg><div class="prog-ring-label" style="color:${col}">${lbl||pct+'%'}</div></div>`;
}
function svgLine(data,w,h){
  if(!data.length)return'<div class="empty-msg f13">Nessun quiz completato</div>';
  const pad=24,pw=w-pad*2,ph=h-pad*2,mx=Math.max(...data,100),mn=Math.min(...data,0),rng=mx-mn||1;
  const pts=data.map((v,i)=>({x:pad+(data.length>1?i/(data.length-1)*pw:pw/2),y:pad+ph-(v-mn)/rng*ph,v}));
  let path=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const passY=pad+ph-(PASS-mn)/rng*ph;
  return`<div class="line-chart"><svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><line x1="${pad}" y1="${passY}" x2="${w-pad}" y2="${passY}" stroke="var(--ok)" stroke-dasharray="4 4" stroke-width="1" opacity=".5"/><text x="${w-pad+4}" y="${passY+4}" font-size="10" fill="var(--ok)">70%</text><path d="${path}" fill="none" stroke="var(--pri)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="var(--pri)"/><text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)-10}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--tx2)">${p.v}%</text>`).join('')}</svg></div>`;
}

/* QUIZ RESULTS */
function vQuizRes(){
  const tot=S.quizQs.length;let cor=0;const byD={1:{c:0,t:0},2:{c:0,t:0},3:{c:0,t:0}};const wrong=[];
  S.quizQs.forEach((q,i)=>{
    const sel=S.qAnswers[i],ok=sel!==undefined&&q.options[sel]&&q.options[sel].correct;
    if(ok)cor++;else wrong.push({q,selected:sel,idx:i});
    const d=q.domain||0;if(!byD[d])byD[d]={c:0,t:0};byD[d].t++;if(ok)byD[d].c++;
  });
  const sc=Math.round(cor/tot*100),pass=sc>=PASS;
  // Source breakdown
  const bySrc={};
  S.quizQs.forEach((q,i)=>{
    const src=q.source||'other';if(!bySrc[src])bySrc[src]={c:0,t:0};bySrc[src].t++;
    const sel2=S.qAnswers[i],ok2=sel2!==undefined&&q.options[sel2]&&q.options[sel2].correct;
    if(ok2)bySrc[src].c++;
  });
  return`<div class="sub-hdr"><button class="back-btn" data-action="nav" data-view="home">${I.back}</button><h2>Risultati</h2></div>
    <div class="card text-center" style="padding:28px"><div class="result-big ${pass?'result-pass':'result-fail'}">${sc}%</div><div style="font-size:18px;font-weight:700;margin-top:8px;${pass?'color:var(--ok)':'color:var(--err)'}">${pass?'SUPERATO ✓':'NON SUPERATO ✗'}</div><div style="font-size:13px;color:var(--tx2);margin-top:4px">${cor}/${tot} corrette</div></div>
    <div class="section-title">Per dominio</div><div class="card">${[1,2,3].map(d=>{const dd=byD[d]||{c:0,t:0};const p=dd.t?Math.round(dd.c/dd.t*100):0;const col=p>=80?'var(--ok)':p>=50?'var(--warn)':'var(--err)';return`<div class="bar-row"><span class="bar-label">D${d}</span><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div><span class="bar-val" style="color:${col}">${p}%</span></div>`;}).join('')}</div>
    <div class="section-title">Per fonte</div><div class="card">${Object.entries(bySrc).map(([src,dd])=>{const p=dd.t?Math.round(dd.c/dd.t*100):0;const col=p>=80?'var(--ok)':p>=50?'var(--warn)':'var(--err)';const label=SOURCES.find(s=>s.id===src);return`<div class="bar-row"><span class="bar-label" style="width:60px;font-size:11px">${label?label.label.split('(')[0].trim():src}</span><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div><span class="bar-val" style="color:${col}">${p}%</span></div>`;}).join('')}</div>
    ${wrong.length?`<div class="section-title">Sbagliate (${wrong.length})</div>${wrong.slice(0,20).map(w=>{const co=w.q.options.find(o=>o.correct);return`<div class="card card-sm" style="border-left:3px solid var(--err);margin-bottom:8px"><div style="font-size:14px;font-weight:600;margin-bottom:6px">${inl(w.q.question)}</div><div style="font-size:13px;color:var(--err);margin-bottom:4px">✗ ${w.selected!==undefined&&w.q.options[w.selected]?w.q.options[w.selected].text:'—'}</div><div style="font-size:13px;color:var(--ok)">✓ ${co?co.text:''}</div>${w.q.explanation?`<div style="font-size:12px;color:var(--tx3);margin-top:6px;line-height:1.5">${inl(w.q.explanation)}</div>`:''}</div>`;}).join('')}`:''}
    <div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-sec btn-full" data-action="nav" data-view="home">Torna alla Home</button><button class="btn btn-pri btn-full" data-action="startQuiz">Nuovo Quiz</button></div><div style="height:16px"></div>`;
}

function vSimSetup(){
  if(!S.simulations.length)return`<div class="sub-hdr"><button class="back-btn" data-action="nav" data-view="home">${I.back}</button><h2>Simulazioni Esame</h2></div><div class="empty-msg"><div class="spinner" style="margin:0 auto"></div><p style="margin-top:12px">Caricamento simulazioni...</p></div>`;
  return`<div class="sub-hdr"><button class="back-btn" data-action="nav" data-view="home">${I.back}</button><h2>Simulazioni Esame</h2></div>
    <p style="font-size:14px;color:var(--tx2);margin-bottom:12px;line-height:1.5">3 simulazioni complete da 40 domande ciascuna, tutte in italiano. Soglia superamento: 70%.</p>
    ${S.simulations.map((sim,si)=>{
      const hist=S.quizHist.filter(h=>h.simId===sim.id);const last=hist.length?hist[hist.length-1]:null;
      return`<div class="sim-card" data-action="startSim" data-idx="${si}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:16px;font-weight:700">Simulazione ${sim.id}</div><div style="font-size:13px;color:var(--tx3)">${sim.title} · ${sim.questions.length} domande</div></div>
          ${last?`<span class="badge ${last.score>=PASS?'badge-ok':'badge-err'}">${last.score}%</span>`:`<span class="badge badge-info">Da fare</span>`}
        </div>
      </div>`;
    }).join('')}`;
}

/* HELPERS */
function fmtD(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});}
function setupSearch(){
  const inp=document.getElementById('csSearch'),cnt=document.getElementById('csContent');
  if(!inp||!cnt)return;
  const orig=cnt.innerHTML;
  inp.addEventListener('input',()=>{
    const q=inp.value.toLowerCase().trim();
    if(!q){cnt.innerHTML=orig;return;}
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    cnt.innerHTML=orig.replace(/>([^<]+)</g,(m,t)=>'>'+t.replace(re,'<mark style="background:var(--warn);padding:1px 2px;border-radius:2px">$1</mark>')+'<');
  });
}
function setupSwipe(){
  const wrap=document.getElementById('fcWrap');if(!wrap)return;
  let sx=0,dx=0,sw=false;const inn=document.getElementById('fcInner');
  wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;sw=true;},{passive:true});
  wrap.addEventListener('touchmove',e=>{if(!sw||!S.stFlipped)return;dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-(e.touches[0].clientY);if(inn){inn.style.transform=`rotateY(180deg) translateX(${-dx}px)`;inn.style.opacity=Math.max(0.4,1-Math.abs(dx)/300);}},{passive:true});
  wrap.addEventListener('touchend',()=>{if(!sw||!S.stFlipped){sw=false;return;}if(inn){inn.style.transform='';inn.style.opacity='';}if(Math.abs(dx)>80){if(S.subView==='errStudy'){dx>0?handleA('errYes'):handleA('errNo');}else{dx>0?handleA('cardYes'):handleA('cardNo');}}sw=false;dx=0;});
  wrap.addEventListener('click',()=>{if(!S.stFlipped)handleA('flipCard');});
}
function setupQuizSwipe(){
  const vc=document.getElementById('vc');if(!vc)return;
  let sx=0,sy=0,dx=0,active=false;
  vc.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;active=true;},{passive:true});
  vc.addEventListener('touchmove',e=>{
    if(!active)return;
    dx=e.touches[0].clientX-sx;
    const dy=Math.abs(e.touches[0].clientY-sy);
    if(dy>Math.abs(dx)){active=false;return;}
  },{passive:true});
  vc.addEventListener('touchend',()=>{
    if(!active){active=false;return;}
    if(dx>60&&S.qIdx>0){S.qIdx--;render();}
    else if(dx<-60&&S.qAnswers[S.qIdx]!==undefined&&S.qIdx<S.quizQs.length-1){S.qIdx++;render();}
    active=false;dx=0;
  });
}
function showModal(){
  if(!S.modal)return;const ex=document.querySelector('.overlay');if(ex)ex.remove();
  const div=document.createElement('div');div.className='overlay';div.innerHTML=`<div class="modal">${S.modal}</div>`;
  document.body.appendChild(div);div.addEventListener('click',e=>{if(e.target===div){S.modal=null;div.remove();}});
}

/* ACTIONS */
function handleA(a,d){
  d=d||{};
  switch(a){
    case 'nav':S.view=d.view;S.subView=null;if(d.view==='studio'){S.studioCards=[];S.stIdx=0;S.stFlipped=false;}if(d.view==='guidedStudy')S.subView=1;if(d.view==='quiz'){S.qShowSetup=true;S.quizQs=[];}render();break;
    case 'toggleDark':S.darkMode=!S.darkMode;document.documentElement.setAttribute('data-theme',S.darkMode?'dark':'');saveP();render();break;
    case 'retry':case 'forceRefresh':loadCore(true);loadExtras(true);break;
    case 'startStudio':S.session++;S.studioCards=getStudyCards(S.stFilter);S.stIdx=0;S.stFlipped=false;updateStreak();saveP();render();break;
    case 'setFilter':S.stFilter=d.filter;render();break;
    case 'flipCard':S.stFlipped=true;render();break;
    case 'cardYes':if(S.studioCards[S.stIdx])markCard(S.studioCards[S.stIdx].id,true);S.stIdx++;S.stFlipped=false;render();break;
    case 'cardNo':if(S.studioCards[S.stIdx])markCard(S.studioCards[S.stIdx].id,false);S.stIdx++;S.stFlipped=false;render();break;
    case 'endStudio':S.studioCards=[];S.stIdx=0;S.stFlipped=false;render();break;
    case 'toggleSource':{const src=d.src;S.qSetup.sources[src]=!S.qSetup.sources[src];render();break;}
    case 'setQCount':S.qSetup.count=d.count;render();break;
    case 'setQDomain':S.qSetup.domain=d.domain;render();break;
    case 'setQMode':S.qSetup.mode=d.mode;render();break;
    case 'setQDifficulty':S.qSetup.difficulty=d.diff;render();break;
    case 'launchQuiz':
      S.quizQs=genPracticeQuiz();S.qIdx=0;S.qAnswers={};S.qDone=false;S.qFlagged=new Set();S.quizMode='practice';
      S.qShowSetup=false;S.view='quiz';updateStreak();render();break;
    case 'startQuiz':
      S.qShowSetup=true;S.quizQs=[];S.view='quiz';render();break;
    case 'startSim':{
      const sim=S.simulations[parseInt(d.idx)];if(!sim)break;
      S.quizQs=sim.questions.map(q=>({...q,options:[...q.options]}));S.qIdx=0;S.qAnswers={};S.qDone=false;S.qFlagged=new Set();
      S.quizMode='sim';S._simId=sim.id;S.view='quiz';updateStreak();render();break;
    }
    case 'quizAnswer':if(S.qAnswers[S.qIdx]===undefined){S.qAnswers[S.qIdx]=parseInt(d.idx);render();}break;
    case 'quizNext':if(S.qAnswers[S.qIdx]===undefined)break;if(S.qIdx>=S.quizQs.length-1){finishQuiz();break;}S.qIdx++;render();break;
    case 'quizPrev':if(S.qIdx>0){S.qIdx--;render();}break;
    case 'toggleFlag':if(S.qFlagged.has(S.qIdx))S.qFlagged.delete(S.qIdx);else S.qFlagged.add(S.qIdx);render();break;
    case 'startErrReview':S.studioCards=getErrCards();S.stIdx=0;S.stFlipped=false;S.subView='errStudy';updateStreak();render();break;
    case 'endErrReview':S.subView=null;S.view='errorReview';render();break;
    case 'errYes':{const c=S.studioCards[S.stIdx];if(c){if(!S.wrongAns[c.id])S.wrongAns[c.id]={cc:0};S.wrongAns[c.id].cc++;saveP();}S.stIdx++;S.stFlipped=false;render();break;}
    case 'errNo':{const c=S.studioCards[S.stIdx];if(c){if(!S.wrongAns[c.id])S.wrongAns[c.id]={cc:0};S.wrongAns[c.id].cc=0;saveP();}S.stIdx++;S.stFlipped=false;render();break;}
    case 'confirmReset':
      S.modal=`<h2>Reset progresso</h2><p style="color:var(--tx2);font-size:14px;line-height:1.6;margin-bottom:20px">Tutti i progressi verranno eliminati. Irreversibile.</p><div style="display:flex;gap:10px"><button class="btn btn-sec btn-full" data-action="closeModal">Annulla</button><button class="btn btn-full" style="background:var(--err);color:#fff" data-action="doReset">Conferma</button></div>`;
      showModal();break;
    case 'closeModal':S.modal=null;document.querySelector('.overlay')?.remove();break;
    case 'doReset':resetProgress();S.modal=null;document.querySelector('.overlay')?.remove();render();break;
    case 'studyWeak':
    case 'studyTopic':{const h3s=JSON.parse(decodeURIComponent(d.h3s));S.studioCards=S.cards.filter(c=>h3s.includes(c.subtopic));S.stIdx=0;S.stFlipped=false;S.session++;updateStreak();saveP();S.view='studio';render();break;}
    case 'setStudyDomain':S.subView=parseInt(d.domain);render();break;
    case 'planCheck':{const key=d.key;S.planChecks[key]=!S.planChecks[key];saveP();
      const el=document.querySelector(`[data-key="${key}"]`);if(el)el.checked=S.planChecks[key];break;}
  }
}
function finishQuiz(){
  let cor=0;const ans={};
  S.quizQs.forEach((q,i)=>{
    const sel=S.qAnswers[i],ok=sel!==undefined&&q.options[sel]&&q.options[sel].correct;
    if(ok)cor++;else{S.qWrongHistory[q.id]=(S.qWrongHistory[q.id]||0)+1;}
    ans[q.id]=ok;
    if(!ok&&q.id&&q.id.toString().startsWith('FC')){
      const cid=parseInt(q.id.replace('FC',''));
      if(!S.wrongAns[cid])S.wrongAns[cid]={cc:0};S.wrongAns[cid].cc=0;
    }
  });
  const sc=Math.round(cor/S.quizQs.length*100);
  const entry={score:sc,total:S.quizQs.length,correct:cor,date:new Date().toISOString(),answers:ans};
  if(S.quizMode==='sim')entry.simId=S._simId;
  S.quizHist.push(entry);if(S.quizHist.length>30)S.quizHist=S.quizHist.slice(-30);
  S.qDone=true;saveP();S.view='quizResults';render();
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  // Special: plan checkboxes
  if(el.tagName==='INPUT'&&el.dataset.action==='toggleSource'){const src=el.dataset.src;S.qSetup.sources[src]=el.checked;render();return;}
  if(el.tagName==='INPUT'&&el.dataset.action==='planCheck'){
    const key=el.dataset.key;S.planChecks[key]=el.checked;saveP();return;
  }
  e.preventDefault();const ds={...el.dataset};const a=ds.action;delete ds.action;handleA(a,ds);
});
window.addEventListener('online',()=>{S.isOffline=false;render();});
window.addEventListener('offline',()=>{S.isOffline=true;render();});

function init(){loadP();setupPWA();loadCore(false);}
init();
})();
</script>
