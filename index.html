{id:"C3",domain:3,question:"Quale effetto di Azure Policy blocca la creazione di una risorsa non conforme?",options:["Audit","Append","Deny","Disabled"],correct:2,explanation:"L'effetto Deny blocca la creazione o l'aggiornamento di risorse non conformi. Audit registra solo un warning."},
{id:"C4",domain:3,question:"Devi impedire che un database critico in Azure possa essere eliminato da chiunque, anche utenti con ruolo Owner. Cosa dovresti usare?",options:["Azure Policy con effetto Deny","Un resource lock di tipo Delete","Rimuovere i permessi di eliminazione dal ruolo Owner","Spostare il database in un'altra subscription"],correct:1,explanation:"Un lock delete impedisce l'eliminazione indipendentemente dal ruolo RBAC. Anche gli Owner devono rimuovere il lock prima."},
{id:"C5",domain:3,question:"Quale strumento fornisce raccomandazioni personalizzate per risparmi sui costi, sicurezza, affidabilità e prestazioni?",options:["Azure Monitor","Azure Service Health","Azure Advisor","Azure Policy"],correct:2,explanation:"Azure Advisor analizza le tue risorse e fornisce raccomandazioni personalizzate su costi, sicurezza, affidabilità, prestazioni e eccellenza operativa."},
{id:"C6",domain:3,question:"Qual è lo scopo principale dei template ARM?",options:["Monitorare le risorse Azure","Definire deployment dichiarativi e ripetibili di risorse in JSON","Creare budget e alert","Gestire le identità utente"],correct:1,explanation:"I template ARM sono file JSON dichiarativi che definiscono risorse Azure per deployment ripetibili."},
{id:"C7",domain:3,question:"Azure Arc estende le funzionalità di gestione Azure a:",options:["Solo risorse Azure","Solo server Windows on-premises","Server on-premises, VM e cluster Kubernetes in qualsiasi cloud","Solo cluster Kubernetes"],correct:2,explanation:"Azure Arc estende gestione e governance a risorse on-premises e in altri cloud."},
{id:"C8",domain:3,question:"Quale funzionalità di monitoraggio Azure usa KQL (Kusto Query Language) per interrogare i dati?",options:["Azure Advisor","Application Insights","Log Analytics","Azure Service Health"],correct:2,explanation:"Log Analytics usa KQL per interrogare i dati di monitoraggio aggregati."},
{id:"C9",domain:3,question:"Quale ruolo RBAC è necessario per creare un resource lock?",options:["Reader","Contributor","Owner o User Access Administrator","Qualsiasi ruolo"],correct:2,explanation:"Per creare resource lock serve il ruolo Owner o User Access Administrator."},
{id:"C10",domain:3,question:"Vuoi impacchettare template ARM, policy, assegnazioni RBAC e resource group in una definizione di deployment riutilizzabile. Quale servizio dovresti usare?",options:["Azure Policy","Azure Blueprints","Azure Resource Manager","Azure Advisor"],correct:1,explanation:"Azure Blueprints impacchetta template, policy, ruoli e RG in definizioni riutilizzabili. NOTA: Blueprints è in fase di ritiro → sostituito da Template Specs + Deployment Stacks."},
{id:"C11",domain:3,question:"Il traffico di rete in ingresso verso un datacenter Azure è gratuito.",options:["Vero","Falso"],correct:0,explanation:"Il traffico in ingresso (ingress) è gratuito. Si paga per il traffico in uscita (egress) dopo i primi 100 GB."},
{id:"C12",domain:3,question:"Le Azure Reservations permettono di risparmiare impegnandosi nell'utilizzo di risorse per 1 o 3 anni.",options:["Vero","Falso"],correct:0,explanation:"Le Reservations offrono sconti significativi per impegni di 1 o 3 anni."},
{id:"C13",domain:3,question:"Azure Blueprints è un sostituto dei template ARM.",options:["Vero","Falso"],correct:1,explanation:"Blueprints NON sostituisce i template ARM. La maggior parte dei Blueprints usa template ARM come artefatti."},
{id:"C14",domain:3,question:"Azure Cloud Shell richiede un account storage per persistere impostazioni e file.",options:["Vero","Falso"],correct:0,explanation:"Cloud Shell richiede un account storage per persistere file, estensioni e impostazioni."},
{id:"C15",domain:3,question:"Un resource lock di tipo read-only impedisce sia le modifiche che l'eliminazione della risorsa bloccata.",options:["Vero","Falso"],correct:0,explanation:"Un lock read-only è il più restrittivo — impedisce sia modifiche alle proprietà CHE l'eliminazione."},
{id:"C16",domain:3,question:"Azure Service Health mostra lo stato di TUTTI i servizi Azure globalmente, non solo i tuoi.",options:["Vero","Falso"],correct:1,explanation:"Service Health mostra lo stato dei servizi specifici per LE TUE risorse e regioni. La vista globale è Azure Status."},
{id:"D1",domain:1,question:"Che cos'è il cloud computing?",options:["Distribuzione di servizi di storage via internet","Distribuzione di servizi di calcolo via internet","Distribuzione di siti web accessibili via internet"],correct:1,explanation:"Il cloud computing è la distribuzione di servizi di calcolo via internet — inclusi VM, storage, database, rete, IoT, ML e AI."},
{id:"D2",domain:1,question:"Quale modello cloud usa alcuni datacenter per fornire servizi a chiunque e altri dedicati a un singolo cliente?",options:["Cloud pubblico","Cloud ibrido","Multi-cloud"],correct:1,explanation:"Il cloud ibrido combina datacenter pubblici (per chiunque) con datacenter privati/dedicati (per un singolo cliente)."},
{id:"D3",domain:1,question:"Secondo il modello di responsabilità condivisa, quale tipo di servizio cloud assegna la maggior responsabilità al cliente?",options:["IaaS","SaaS","PaaS"],correct:0,explanation:"IaaS assegna la maggior responsabilità al cliente (OS, middleware, app, dati)."},
{id:"D4",domain:1,question:"Quale tipo di scaling consiste nell'aggiungere o rimuovere risorse per soddisfare la domanda?",options:["Scaling verticale","Scaling orizzontale","Scaling diretto"],correct:1,explanation:"Scaling orizzontale = aggiungere o rimuovere risorse (VM, container)."},
{id:"D5",domain:1,question:"Quale concetto descrive la capacità di un sistema di recuperare dai guasti e continuare a funzionare?",options:["Affidabilità (Reliability)","Prevedibilità (Predictability)","Scalabilità"],correct:0,explanation:"L'affidabilità è la capacità di recuperare dai guasti e continuare a funzionare."},
{id:"D6",domain:1,question:"Quale pratica cloud supporta più direttamente la sostenibilità riducendo l'uso non necessario di risorse?",options:["Ridurre automaticamente le risorse quando la domanda cala","Distribuire ogni carico a capacità massima sempre attiva","Usare solo hardware on-premises"],correct:0,explanation:"Ridurre automaticamente quando la domanda cala riduce gli sprechi e supporta la sostenibilità."},
{id:"D7",domain:1,question:"Quale tipo di servizio cloud è più adatto per una migrazione lift-and-shift da un datacenter on-premises?",options:["IaaS","PaaS","SaaS"],correct:0,explanation:"Lift-and-shift richiede IaaS — configuri risorse cloud simili a quelle on-prem e sposti i carichi."},
{id:"D8",domain:1,question:"Una soluzione di gestione finanze e spese è tipicamente quale tipo di servizio cloud?",options:["IaaS","PaaS","SaaS"],correct:2,explanation:"Gestione finanze e spese è un'applicazione completamente sviluppata che affitti — un classico scenario SaaS."},
{id:"D9",domain:2,question:"A quanti resource group può appartenere una risorsa contemporaneamente?",options:["Uno","Due","Tre"],correct:0,explanation:"Una risorsa può appartenere a esattamente un resource group alla volta."},
{id:"D10",domain:2,question:"Cosa succede alle risorse quando viene applicata un'azione a livello di Resource Group?",options:["Le risorse attuali ereditano, quelle future no","Le risorse future ereditano, quelle attuali no","L'impostazione si applica alle risorse attuali e future"],correct:2,explanation:"Le azioni a livello di resource group si applicano a TUTTE le risorse — attuali e future."},
{id:"D11",domain:2,question:"Quale funzionalità Azure replica le risorse tra regioni distanti almeno 300 miglia?",options:["Coppie regionali (Region pairs)","Zone di disponibilità","Regioni sovrane"],correct:0,explanation:"Le coppie regionali sono due regioni nella stessa geografia, distanti almeno 300 miglia, progettate per il disaster recovery."},
{id:"D12",domain:2,question:"Quale funzionalità delle VM Azure distribuisce gli aggiornamenti in base a update domain e fault domain?",options:["Availability set","Scale set","Update set"],correct:0,explanation:"Gli availability set usano update domain (manutenzione pianificata) e fault domain (guasti hardware)."},
{id:"D13",domain:2,question:"Quale opzione di calcolo Azure è event-driven e serverless, permettendo di eseguire codice senza gestire VM?",options:["Azure Functions","Azure Virtual Machines","Azure Container Instances"],correct:0,explanation:"Azure Functions è event-driven e serverless — il codice viene eseguito solo quando attivato."},
{id:"D14",domain:2,question:"Quale servizio Azure permette alle organizzazioni di ospitare web app e API senza gestire l'infrastruttura sottostante?",options:["Azure App Service","Azure Virtual Machines","Azure ExpressRoute"],correct:0,explanation:"Azure App Service è un PaaS HTTP-based per ospitare web app e REST API senza gestire infrastruttura."},
{id:"D15",domain:2,question:"Quale categoria di servizi Azure fornisce API precostruite per visione, voce e linguaggio senza addestrare modelli?",options:["Servizi di intelligenza artificiale Azure","Azure Virtual Machines","Azure Virtual Networks"],correct:0,explanation:"I servizi AI Azure forniscono API precostruite per visione, voce, linguaggio e elaborazione documenti."},
{id:"D16",domain:2,question:"Quale funzionalità di networking Azure permette di dividere una rete virtuale in segmenti logici più piccoli?",options:["Subnet","Availability set","Resource lock"],correct:0,explanation:"Le subnet dividono una rete virtuale in segmenti logici più piccoli."},
{id:"D17",domain:2,question:"Se un'azienda ha bisogno di connettività privata e prevedibile tra un datacenter on-premises e Azure, quale servizio è più adatto?",options:["Azure ExpressRoute","Azure Front Door","Azure Load Balancer"],correct:0,explanation:"Azure ExpressRoute fornisce una connessione privata dedicata tra on-premises e Azure."},
{id:"D18",domain:2,question:"Quale tipo di VPN gateway è raccomandato in Azure per connessioni tra reti virtuali e scenari multisito?",options:["VPN gateway basato su route","VPN gateway basato su policy","VPN gateway basato su punti"],correct:0,explanation:"I VPN gateway basati su route sono preferiti e più resilienti ai cambiamenti di topologia."},
{id:"D19",domain:2,question:"Qual è un vantaggio principale di Azure DNS?",options:["Puoi gestire i record DNS usando credenziali e strumenti Azure","Fornisce un registrar di domini integrato","Elimina la necessità di tutti i controlli di sicurezza di rete"],correct:0,explanation:"Azure DNS si integra con il portale Azure, usando le stesse credenziali e fatturazione. NON può acquistare nomi di dominio."},
{id:"D20",domain:2,question:"Quale strumento mantiene automaticamente sincronizzati i file tra un server Windows on-premises e un ambiente cloud Azure?",options:["Azure File Sync","Azure Storage Explorer","AzCopy"],correct:0,explanation:"Azure File Sync sincronizza automaticamente i file bidirezionalmente tra server Windows on-premises e Azure Files."},
{id:"D21",domain:2,question:"Quale opzione di ridondanza dello storage offre il massimo grado di durabilità con 16 nines?",options:["LRS (Locally redundant)","ZRS (Zone-redundant)","GZRS (Geo-zone-redundant)"],correct:2,explanation:"GZRS fornisce la massima durabilità a 16 nines combinando ZRS nella regione primaria con geo-replica LRS."},
{id:"D22",domain:2,question:"Quale servizio Azure Storage supporta l'analisi big data e la gestione di dati testuali e binari?",options:["Azure Blobs","Azure Files","Azure Disks"],correct:0,explanation:"Azure Blobs è uno store oggetti scalabile per dati testuali e binari, con Data Lake Storage Gen2 per big data."},
{id:"D23",domain:2,question:"Quale strumento Microsoft Entra può variare le credenziali richieste per il login in base a segnali come la posizione dell'utente?",options:["Conditional Access","Accesso guest","Passwordless"],correct:0,explanation:"Il Conditional Access valuta segnali di identità al momento del login per decidere se consentire, richiedere MFA o bloccare."},
{id:"D24",domain:2,question:"Quale modello di sicurezza presume lo scenario peggiore e protegge le risorse di conseguenza?",options:["Zero Trust","Defense-in-depth","Controllo accessi basato sui ruoli"],correct:0,explanation:"Zero Trust presume la violazione fin dall'inizio e verifica ogni richiesta indipendentemente dall'origine."},
{id:"D25",domain:2,question:"Un utente ha contemporaneamente più ruoli RBAC: Ruolo 1 - lettura, Ruolo 2 - scrittura, Ruolo 3 - lettura e scrittura. Quali sono i permessi effettivi?",options:["Solo lettura","Solo scrittura","Lettura e scrittura"],correct:2,explanation:"Azure RBAC è additivo: i permessi effettivi sono l'unione di tutti i ruoli assegnati."},
{id:"D26",domain:2,question:"Quale servizio Azure è progettato per archiviare in modo sicuro segreti, certificati e chiavi di crittografia?",options:["Azure Key Vault","Azure Policy","Azure Monitor"],correct:0,explanation:"Azure Key Vault è il servizio per archiviare in modo sicuro segreti, chiavi di crittografia e certificati."},
{id:"D27",domain:3,question:"Quale funzionalità Azure aiuta a restare organizzati e tracciare l'utilizzo basandosi sui metadati associati alle risorse?",options:["Tag","Tracer","Valori"],correct:0,explanation:"I tag sono coppie nome/valore che forniscono metadati sulle risorse Azure per gestione, tracciamento costi e operazioni."},
{id:"D28",domain:3,question:"Quale strumento aiuta a stimare il costo dei servizi Azure prima dell'implementazione?",options:["Azure Cost Analysis","Calcolatore dei prezzi Azure (Pricing Calculator)","Azure Advisor"],correct:1,explanation:"Il Pricing Calculator stima i costi potenziali prima del deployment."},
{id:"D29",domain:3,question:"Hai un carico di lavoro che può tollerare interruzioni e deve essere eseguito al minor costo possibile. Quale opzione è più adatta?",options:["Spot Virtual Machines","Reservations","Solo pay-as-you-go"],correct:0,explanation:"Le Spot VM usano capacità inutilizzata con sconti fino al 90% — ideali per carichi interrompibili."},
{id:"D30",domain:3,question:"Come puoi impedire la creazione di risorse non conformi senza dover valutare manualmente ogni risorsa?",options:["Azure Policy","Microsoft Purview","Azure Resource Monitor"],correct:0,explanation:"Azure Policy definisce regole che vengono applicate automaticamente quando le risorse vengono create o aggiornate."},
{id:"D31",domain:3,question:"Qual è il modo migliore per impedire l'eliminazione accidentale di una risorsa?",options:["Azure Policy","Microsoft Purview","Resource lock Azure"],correct:2,explanation:"I resource lock impediscono l'eliminazione o la modifica accidentale delle risorse, indipendentemente dal ruolo RBAC."},
{id:"D32",domain:3,question:"Quale servizio ti aiuta a gestire ambienti Azure, on-premises e multicloud?",options:["Azure Arc","Azure Policy","Azure Cloud Manager"],correct:0,explanation:"Azure Arc estende gestione e governance Azure ad ambienti on-premises e multicloud."},
{id:"D33",domain:3,question:"Quali due componenti puoi usare per implementare un deployment 'infrastructure as code'?",options:["Bicep e template ARM","Azure Policy e Azure Arc","Azure Monitor e Azure Arc"],correct:0,explanation:"Bicep e template ARM sono entrambi strumenti IaC dichiarativi e idempotenti che distribuiscono tramite ARM."},
{id:"D34",domain:3,question:"Quale NON è una delle categorie di raccomandazione di Azure Advisor?",options:["Affidabilità (Reliability)","Capacità (Capacity)","Costo (Cost)"],correct:1,explanation:"'Capacità' NON è una categoria di Advisor. Le cinque sono: Reliability, Security, Performance, Operational Excellence, Cost."},
{id:"D35",domain:3,question:"Ricevi una notifica che le VM in una regione Azure dove hai VM distribuite stanno subendo un'interruzione. Quale componente di Service Health ti dirà se la tua applicazione è impattata?",options:["Azure Status","Service Health","Resource Health"],correct:2,explanation:"Resource Health mostra lo stato di singole risorse e indica se il problema è lato Azure o lato tuo."},
{id:"G1",domain:1,question:"Quali sono le responsabilità dei clienti secondo il modello di responsabilità condivisa?",options:["Patch e correzione dell'infrastruttura","Patch del sistema operativo guest e delle applicazioni","Controlli fisici e ambientali","Configurazione dei dispositivi infrastrutturali Azure"],correct:1,explanation:"Il provider gestisce sempre l'infrastruttura fisica. In IaaS, il cliente è responsabile del patching di OS guest e applicazioni."},
{id:"G2",domain:1,question:"Quale modello di deployment cloud consente a un'organizzazione di eliminare tutto l'hardware on-premises migrando al cloud?",options:["Cloud pubblico","Cloud privato on-premises","Cloud ibrido","IaaS"],correct:0,explanation:"Il cloud pubblico consente di chiudere il datacenter ospitando l'infrastruttura presso un provider di terze parti."},
{id:"G3",domain:1,question:"Un'azienda ha distribuito il suo carico di lavoro sia su Azure Cloud che su alcuni server on-premises. Che tipo di architettura è?",options:["VPN (Virtual Private Network)","Virtual Private Cloud","Cloud ibrido","Cloud privato"],correct:2,explanation:"Il cloud ibrido combina infrastruttura on-premises con cloud pubblico."},
{id:"G4",domain:1,question:"Quale descrive correttamente il beneficio della scalabilità nel cloud?",options:["Un servizio cloud accessibile rapidamente da internet","Un servizio che può recuperare dopo un guasto","Un servizio che resta disponibile dopo un guasto","Un servizio che mantiene prestazioni elevate all'aumentare della domanda"],correct:3,explanation:"Scalabilità = adeguare le risorse per soddisfare la domanda mantenendo le prestazioni."},
{id:"G5",domain:1,question:"Un'app ha basso utilizzo per gran parte del mese ma alta domanda nell'ultima settimana. Quale beneficio del cloud aiuta a gestire i costi?",options:["Alta disponibilità","Disaster recovery","Elasticità","Tolleranza ai guasti"],correct:2,explanation:"L'elasticità scala automaticamente in base alla domanda — paghi solo durante i picchi."},
{id:"G6",domain:1,question:"Un sistema Azure è progettato per resistere al guasto di uno o più componenti. Di cosa è un esempio?",options:["Elasticità","Alta disponibilità","Scalabilità","Agilità"],correct:1,explanation:"Alta disponibilità = tecnologie che minimizzano le interruzioni IT attraverso ridondanza e failover."},
{id:"G7",domain:2,question:"Quale risorsa è un esempio di IaaS in Azure?",options:["Una Azure web app","Una macchina virtuale Azure","Una Azure logic app","Un Azure SQL database"],correct:1,explanation:"Web app, logic app e SQL database sono tutti PaaS. Una VM è IaaS perché gestisci l'OS."},
{id:"G8",domain:1,question:"Quale tipo di servizio è un ambiente completo di sviluppo e deployment nel cloud?",options:["IaaS","PaaS","SaaS","Cloud pubblico"],correct:1,explanation:"PaaS è un ambiente completo per sviluppo e deployment nel cloud."},
{id:"G9",domain:1,question:"Microsoft Office 365 è un esempio di quale tipo di servizio?",options:["Cloud privato","IaaS","PaaS","SaaS"],correct:3,explanation:"SaaS = app cloud usate via internet. Office 365 è un classico esempio SaaS."},
{id:"G10",domain:2,question:"Una regione Azure contiene un insieme di datacenter collegati da una rete a bassa latenza.",options:["Vero","Falso"],correct:0,explanation:"Vero. Una regione Azure è un insieme di datacenter in un'area geografica connessi da una rete dedicata a bassa latenza."},
{id:"G11",domain:3,question:"Un'azienda con sette reparti vuole che ciascuno abbia opzioni di pagamento diverse per i servizi Azure. Cosa dovrebbe creare per ogni reparto?",options:["Una reservation","Una subscription","Un resource group","Un container instance"],correct:1,explanation:"I costi Azure vengono fatturati per subscription. Per opzioni di pagamento diverse, crea subscription separate."},
{id:"G12",domain:2,question:"Quando devi delegare permessi a diverse VM Azure contemporaneamente, devi distribuirle nello stesso ___.",options:["Regione Azure","Template ARM","Resource group","Availability zone"],correct:2,explanation:"I permessi applicati a un resource group si applicano a tutte le risorse al suo interno."},
{id:"G13",domain:2,question:"Un'organizzazione vuole usare solo soluzioni PaaS in Azure. Quale servizio dovrebbe usare?",options:["Azure VM","Azure Storage accounts","Azure App Service","Azure Virtual Networks"],correct:2,explanation:"Azure App Service è PaaS. VM e VNet sono IaaS; Storage accounts sono infrastruttura."},
{id:"G14",domain:2,question:"Cos'è Azure Virtual Network?",options:["Il servizio email di Microsoft","Un framework per gestire dispositivi di rete fisici","Un ambiente di rete isolato in Microsoft Azure","Un servizio per gestire macchine virtuali"],correct:2,explanation:"VNet è un ambiente di rete isolato in Azure per la comunicazione sicura tra risorse."},
{id:"G15",domain:2,question:"Cosa fornisce Azure ExpressRoute?",options:["Soluzioni di storage migliorate","Connettività diretta ai servizi Azure","Scaling automatico delle VM","Crittografia dati per reti virtuali"],correct:1,explanation:"ExpressRoute fornisce una connessione dedicata privata dall'on-premises ad Azure, senza internet pubblico."},
{id:"G16",domain:2,question:"Quale tipo di storage NON è supportato dall'account di storage Azure?",options:["Blob storage","Table storage","Queue storage","Cosmos DB","Azure File"],correct:3,explanation:"Storage Account supporta Blob, Queue, Table e Azure Files. Cosmos DB è un servizio database separato."},
{id:"G17",domain:2,question:"Quale servizio Azure sincronizza i dati tra server Windows on-premises e una condivisione file Azure?",options:["Azure Storage Explorer","Azure File Sync","AzCopy","Azure Storage Account"],correct:1,explanation:"Azure File Sync sincronizza i file tra server Windows on-premises e condivisioni Azure Files."},
{id:"G18",domain:2,question:"Quale servizio Azure NON può essere usato per spostare singoli file tra cloud?",options:["Azure Storage Account","Azure Storage Explorer","Azure File Sync","AzCopy"],correct:2,explanation:"File Sync sincronizza intere condivisioni — non è progettato per spostare singoli file tra cloud."},
{id:"G19",domain:2,question:"Microsoft Entra MFA include tipicamente tutti i seguenti metodi TRANNE:",options:["Qualcosa che sai","Qualcosa che hai","Qualcosa che sei","Qualcuno che conosci"],correct:3,explanation:"I fattori MFA sono: qualcosa che sai (password), che hai (telefono/chiave), che sei (biometrico). 'Qualcuno che conosci' non è un fattore."},
{id:"G20",domain:2,question:"Un'organizzazione vuole migrare tutte le risorse di rete ad Azure minimizzando l'impatto sugli utenti. Quale soluzione usare?",options:["Abilitare Entra ID Protection","Implementare Azure MFA","Creare account guest per ogni utente","Sincronizzare tutti gli account AD on-premises con Microsoft Entra ID"],correct:3,explanation:"Sincronizzare AD on-premises con Entra ID garantisce le stesse credenziali in entrambi gli ambienti."},
{id:"G21",domain:3,question:"Quale strumento valuta continuamente le risorse multicloud per problemi di sicurezza e mostra un punteggio sicuro?",options:["Azure Monitor","Azure Advisor","Microsoft Defender for Cloud","Help + Support"],correct:2,explanation:"Defender for Cloud fornisce un Secure Score e valuta continuamente le risorse."},
{id:"G22",domain:2,question:"Quale servizio Azure fornisce filtraggio del traffico di rete su più subscription e reti virtuali?",options:["Azure Firewall","Application security group","Azure DDoS protection","Network Security Group (NSG)"],correct:0,explanation:"Azure Firewall filtra il traffico centralmente su più VNet e subscription."},
{id:"G23",domain:3,question:"Quale dei seguenti NON è un fattore che influenza i costi in Azure?",options:["Consumo","Manutenzione del datacenter","Geografia","Tipo di risorsa"],correct:1,explanation:"La manutenzione del datacenter è responsabilità del provider cloud — non viene fatturata separatamente."},
{id:"G24",domain:3,question:"Quale strumento dovrebbe essere usato per stimare e confrontare i costi di migrazione dall'on-premises ad Azure?",options:["Calcolatore dei prezzi (Pricing Calculator)","Azure Monitor","Azure Cost Management","Azure Advisor"],correct:0,explanation:"Il Pricing Calculator è ora lo strumento raccomandato per tutte le stime di costo, incluse le migrazioni."},
{id:"G25",domain:3,question:"Un'organizzazione vuole generare report di fatturazione per filiale dal portale Azure. Quale strumento serve prima di generare i report?",options:["Policy","Template","Lock","Tag"],correct:3,explanation:"I tag (metadati chiave-valore) permettono di categorizzare le risorse per filiale e poi filtrare i report costi."},
{id:"G26",domain:3,question:"Quale strumento NON è progettato per la governance e la compliance delle risorse Azure?",options:["Microsoft Purview","Azure Policy","Resource Lock","Portale di Supporto Azure"],correct:3,explanation:"Il Portale di Supporto è per creare ticket, non per governance. Policy, Lock e Purview sono strumenti di governance."},
{id:"G27",domain:3,question:"Qual è lo scopo di Azure RBAC?",options:["Gestire reti virtuali e subnet","Controllare chi può accedere alle risorse Azure e cosa può fare","Monitorare e analizzare le minacce di sicurezza","Automatizzare il deployment delle risorse"],correct:1,explanation:"RBAC controlla chi può accedere alle risorse Azure e quali azioni può eseguire."},
{id:"G28",domain:3,question:"Se vuoi che il tuo team distribuisca risorse Azure solo nelle regioni consentite, quale servizio usare?",options:["RBAC","Resource Lock","Azure Policy","Service Trust Portal"],correct:2,explanation:"Azure Policy con 'Allowed locations' impone dove le risorse possono essere create."},
{id:"G29",domain:3,question:"Un amministratore Azure vuole eseguire uno script per creare VM. Quale metodo NON è disponibile per eseguire gli script direttamente?",options:["Azure Cloud Shell","Azure PowerShell","Azure CLI","Prompt dei comandi Windows (CMD)"],correct:3,explanation:"Gli script Azure si eseguono via Cloud Shell, PowerShell o CLI. Il Prompt dei comandi Windows (CMD) NON è supportato."},
{id:"G30",domain:3,question:"Quale servizio Azure puoi usare per gestire server on-premises e multicloud come risorse Azure?",options:["Azure Advisor","Azure Arc","Azure Monitor","Azure Blueprints"],correct:1,explanation:"Azure Arc gestisce risorse non-Azure (on-prem, AWS, GCP) come risorse Azure."},
{id:"G31",domain:3,question:"Quale formato di file usano i template ARM?",options:["XML","YAML","JSON","CSV"],correct:2,explanation:"I template ARM usano formato JSON. Bicep è un DSL più semplice che viene compilato in JSON ARM."},
{id:"G32",domain:3,question:"Quale raccomandazione NON si trova nella dashboard di Azure Advisor?",options:["Come configurare le impostazioni di rete di una VM","Come ottimizzare e ridurre la spesa Azure","Come migliorare la velocità delle applicazioni","Come rilevare minacce e vulnerabilità di sicurezza"],correct:0,explanation:"La configurazione di rete delle VM non è una categoria di Advisor. Le 5 categorie sono: Cost, Security, Reliability, Operational Excellence, Performance."},
{id:"G33",domain:3,question:"Quale servizio Azure è una dashboard personalizzabile per monitorare lo stato dei servizi Azure, inclusi quelli nelle regioni che usi?",options:["Azure Advisor","Azure Monitor","Azure Arc","Azure Service Health"],correct:3,explanation:"Service Health monitora interruzioni e manutenzioni per i servizi e le regioni che usi effettivamente."},
{id:"G34",domain:3,question:"Quale affermazione è ERRATA riguardo ad Azure Monitor?",options:["Puoi monitorare le prestazioni di server on-premises","Puoi monitorare risorse su più subscription e tenant","Non puoi monitorare le prestazioni di VM ospitate in altri cloud","Puoi creare alert in Azure Monitor"],correct:2,explanation:"ERRATA. Azure Monitor PUÒ monitorare VM in altri cloud (AWS, GCP) e on-premises tramite agent."}
];

function convertItQuestions(){
  return IT_QUESTIONS.map(q=>{
    const opts=q.options.map((text,i)=>({letter:'ABCDE'[i],text,correct:i===q.correct}));

const IT_H_QUESTIONS=[
{id:"H1",domain:1,question:"La tua organizzazione sta distribuendo un'applicazione web su Azure. L'app deve essere accessibile a utenti di tutto il mondo via internet senza VPN o rete privata. Quale modello cloud descrive questo requisito?",options:["Cloud ibrido","Cloud privato","Cloud comunitario","Cloud pubblico"],correct:3,explanation:"I servizi cloud pubblici sono erogati tramite internet pubblico, accessibili a chiunque nel mondo."},
{id:"H2",domain:3,question:"Il responsabile IT vuole una notifica email automatica quando la CPU delle VM supera l'85% per oltre 5 minuti. Quale funzionalità di Azure Monitor serve?",options:["Regola di avviso di Azure Monitor","Test di disponibilità Application Insights","Grafico metriche Azure Monitor","Query workspace Log Analytics"],correct:0,explanation:"Le regole di avviso definiscono condizioni e risposte automatiche (email tramite action group)."},
{id:"H3",domain:3,question:"Il team dev distribuisce risorse manualmente dal portale. Il manager vuole consistenza, meno errori, controllo versione. Quale approccio?",options:["Documentazione dettagliata con screenshot","Più revisori admin","Template ARM","Azure Backup"],correct:2,explanation:"I template ARM sono Infrastructure as Code: file JSON, versionabili in Git, deployment ripetibili e consistenti."},
{id:"H4",domain:2,question:"Un'agenzia governativa USA deve ospitare app che elaborano dati federali sensibili, con isolamento fisico/logico negli USA e conformità FedRAMP High. Quale opzione?",options:["Azure Arc on-premises","Azure cloud pubblico regioni USA","Azure Government","Azure China (21Vianet)"],correct:2,explanation:"Azure Government è un cloud sovrano per agenzie governative USA, fisicamente e logicamente isolato."},
{id:"H5",domain:3,question:"User1 deve poter avviare/arrestare le VM in RG-Production ma NON eliminare o modificare configurazioni. Cosa fare?",options:["Ruolo Reader","Ruolo RBAC personalizzato con solo azioni start/stop VM","Ruolo Virtual Machine Contributor","Ruolo Contributor"],correct:1,explanation:"Principio del privilegio minimo: un ruolo personalizzato concede esattamente i permessi necessari."},
{id:"H6",domain:3,question:"Il responsabile IT vuole dimostrare la distribuzione di una VM usando una GUI in qualsiasi browser web, senza installazioni. Quale strumento?",options:["Azure PowerShell","Azure Mobile App","Portale Azure","Azure CLI"],correct:2,explanation:"Il Portale Azure è una GUI web-based su portal.azure.com. Nessuna installazione necessaria."},
{id:"H7",domain:2,question:"500 dipendenti necessitano SSO per M365 e app Azure personalizzate. Un singolo accesso per tutto. Quale servizio?",options:["Azure Key Vault","Windows Server AD su VM Azure","Microsoft Entra ID","Azure AD DS"],correct:2,explanation:"Entra ID = identità cloud + SSO. Un login = accesso a tutte le app registrate."},
{id:"H8",domain:1,question:"La tua azienda migra una web app su VM Azure (IaaS). Quale compito di sicurezza rimane responsabilità dell'azienda?",options:["Sicurezza dell'hypervisor","Infrastruttura di rete fisica","Sicurezza fisica del datacenter","Patch e aggiornamenti di sicurezza del sistema operativo"],correct:3,explanation:"Modello di responsabilità condivisa: in IaaS il cliente gestisce dall'OS in su (patch, app, dati)."},
{id:"H9",domain:1,question:"Un'azienda di retail ha un'app e-commerce critica che deve restare disponibile anche se un datacenter Azure ha un'interruzione. Quale beneficio di affidabilità Azure risponde a questo requisito?",options:["Distribuzione risorse su più zone di disponibilità in una regione","Modello di pricing pay-as-you-go","Supporto per scaling orizzontale automatico","Certificazioni di conformità Azure"],correct:0,explanation:"Le zone di disponibilità sono datacenter fisicamente separati con alimentazione e rete indipendenti."},
{id:"H10",domain:3,question:"Un'azienda ha server on-premises, VM in AWS e risorse in Azure. Il direttore IT vuole strumenti di gestione Azure, policy Azure e un pannello unico per tutto. Quale servizio?",options:["Azure Arc","Azure Resource Manager","Azure Monitor","Microsoft Defender for Cloud"],correct:0,explanation:"Azure Arc estende la gestione Azure a risorse on-premises e multi-cloud con un unico pannello."},
{id:"H11",domain:2,question:"Gli utenti fuori dalla rete aziendale devono usare MFA; quelli nella rete aziendale solo username/password. Quale funzionalità Entra?",options:["Entra ID Protection","Entra PIM","Entra Conditional Access","Entra MFA (da solo)"],correct:2,explanation:"Conditional Access = policy basate sulla posizione e altri segnali. MFA è la tecnologia; Conditional Access decide QUANDO applicarla."},
{id:"H12",domain:2,question:"Un'azienda che distribuisce un'app business-critical necessita protezione contro guasti a livello di datacenter in una singola regione con SLA 99,99%. Quale funzionalità per distribuire le VM?",options:["Più resource group","Zone di disponibilità","Più regioni Azure","Singolo datacenter con copie di backup"],correct:1,explanation:"Zone di disponibilità = datacenter separati in una regione. SLA 99,99% con VM su 2+ zone."},
{id:"H13",domain:1,question:"Un'azienda retail gestisce il proprio datacenter con server fisici inattivi fuori picco, pagando costi fissi per hardware, raffreddamento e manutenzione. Quale caratteristica del cloud risolve il pagamento di capacità inutilizzata?",options:["Alta disponibilità","Pricing pay-as-you-go","Disaster recovery","Distribuzione geografica"],correct:1,explanation:"Pay-as-you-go = paghi solo le risorse effettivamente usate. Elimina il pagamento di capacità inattiva."},
{id:"H14",domain:1,question:"Un'app e-commerce serve ~1.000 utenti normalmente ma 50.000 durante i saldi stagionali. L'azienda vuole gestire i picchi minimizzando i costi nei periodi normali. Quale capacità cloud?",options:["Scaling orizzontale (scale out)","Scaling verticale (scale up)","Distribuzione geografica","Alta disponibilità"],correct:0,explanation:"Scaling orizzontale = aggiungere/rimuovere istanze in base alla domanda. Ideale per variazioni di traffico drammatiche."},
{id:"H15",domain:2,question:"Un team dev deve distribuire una piccola app che elabora richieste HTTP, esecuzione di secondi, traffico sporadico, minimizzare gestione, pagare solo per il tempo di calcolo. Quale servizio?",options:["Azure Virtual Machines","Azure Container Instances","Azure Functions","Azure App Service"],correct:2,explanation:"Azure Functions (piano consumo) = serverless, event-driven, pay-per-execution. Costo zero quando inattivo."},
{id:"H16",domain:2,question:"Come riduce Azure l'onere della gestione della sicurezza rispetto all'on-premises?",options:["Azure elimina TUTTE le responsabilità di sicurezza","I clienti devono installare il proprio software di sicurezza","Azure fornisce strumenti di sicurezza gestiti/aggiornati da Microsoft","Azure protegge solo i servizi gestiti da Microsoft"],correct:2,explanation:"Responsabilità condivisa: Microsoft gestisce la sicurezza dell'infrastruttura e fornisce strumenti. Non TUTTE le responsabilità sono eliminate."},
{id:"H17",domain:1,question:"Gli sviluppatori vogliono distribuire codice senza gestire VM, OS o hardware. Servono auto-scaling e bilanciamento del carico. Quale modello di servizio?",options:["IaaS — VM Scale Sets","PaaS — Azure App Service","IaaS — Virtual Machines","SaaS — Microsoft 365"],correct:1,explanation:"PaaS = piattaforma gestita; distribuisci codice, non infrastruttura. App Service fornisce auto-scaling e load balancing."},
{id:"H18",domain:3,question:"Distribuire 15 VM identiche in 3 regioni. Garantire consistenza. Semplificare il deployment. Quale capacità ARM?",options:["Resource group","Resource lock","RBAC","Template ARM"],correct:3,explanation:"I template ARM definiscono una volta, distribuiscono più volte. Parametrizzati per regioni/nomi diversi."},
{id:"H19",domain:3,question:"Dati dei clienti in SQL DB, Storage, Data Lake. Il team compliance deve scoprire dati sensibili, classificarli, tracciare l'accesso centralmente. Quale servizio?",options:["Azure Policy","Microsoft Purview","Microsoft Defender for Cloud","Microsoft Entra ID"],correct:1,explanation:"Purview = governance dei dati. Discovery, classificazione (etichette di sensibilità), tracciamento lineage."},
{id:"H20",domain:2,question:"Il team di sicurezza IT necessita valutazione continua della postura di sicurezza, raccomandazioni e alert sulle minacce per VM, storage e database. Quale servizio?",options:["Azure Policy","Entra ID Protection","Azure Monitor","Microsoft Defender for Cloud"],correct:3,explanation:"Defender for Cloud = postura di sicurezza (secure score + raccomandazioni) + rilevamento minacce."},
{id:"H21",domain:2,question:"Un'azienda ha 5 filiali con file server Windows locali. Deve centralizzare in Azure Files garantendo accesso locale rapido anche con internet lento. Quale servizio?",options:["Azure Blob Storage + CDN","Azure File Sync","Azure Files + geo-replica","Azure NetApp Files"],correct:1,explanation:"Azure File Sync = cache locale dei file più usati + storage centralizzato in Azure Files. Sincronizzazione bidirezionale."},
{id:"H22",domain:3,question:"Una web app su Azure App Service ha caricamenti pagina lenti ma il team non riesce a identificare i componenti causa. Serve rilevamento automatico anomalie e identificazione dipendenze. Quale servizio?",options:["Azure Service Health","Application Insights","Microsoft Defender for Cloud","Azure Monitor Logs"],correct:1,explanation:"Application Insights = APM, rileva automaticamente anomalie, traccia dipendenze, identifica colli di bottiglia."},
{id:"H23",domain:3,question:"Tutte le VM su più subscription devono essere distribuite solo in East US e West Europe (residenza dati). Cosa usare per imporre questo?",options:["RBAC","Resource lock","Azure Policy","Defender for Cloud"],correct:2,explanation:"Azure Policy con 'Posizioni consentite' impone dove le risorse possono essere create."},
{id:"H24",domain:3,question:"RG-Prod con VM e storage critici. Impedire l'eliminazione accidentale da admin con livello Contributor, permettendo comunque modifiche alla configurazione. Cosa implementare?",options:["Lock Delete su RG-Prod","Lock Read-only","Defender for Cloud","Rimuovere Contributor, assegnare Reader"],correct:0,explanation:"Lock Delete = impedisce l'eliminazione, permette le modifiche. Read-only lock impedisce entrambe."},
{id:"H25",domain:1,question:"Un'azienda migra dall'on-premises ad Azure. Attualmente paga costi fissi mensili per il datacenter indipendentemente dall'utilizzo. Come cambierà il modello a consumo la struttura dei costi?",options:["Spese di capitale anticipate prima del deployment","Stessi costi totali, distribuiti diversamente","Canone mensile fisso di subscription","Paghi solo le risorse Azure effettivamente usate, con costi variabili in base al consumo"],correct:3,explanation:"Basato sul consumo = paghi per ciò che usi. Passa da CapEx fisso a OpEx variabile."},
{id:"H26",domain:2,question:"Defense-in-depth per un'app con VM + SQL DB + dati sensibili dei clienti. Quale approccio?",options:["Solo NSG","Solo firewall perimetrale + patch VM","Solo RBAC + autenticazione Entra","Più livelli: NSG + crittografia a riposo + MFA + monitoraggio Defender for Cloud"],correct:3,explanation:"Defense in depth = sicurezza a OGNI livello (rete + dati + identità + monitoraggio)."},
{id:"H27",domain:1,question:"Un'azienda manifatturiera deve tenere sistemi di controllo produzione on-premises (normativa + latenza ultra-bassa) ma vuole migrare altri carichi su Azure con strumenti di gestione consistenti. Quale modello cloud?",options:["Cloud ibrido","Cloud comunitario","Cloud pubblico","Cloud privato"],correct:0,explanation:"Cloud ibrido = on-premises + cloud pubblico con integrazione. Soddisfa requisiti normativi mantenendo i vantaggi del cloud."},
{id:"H28",domain:3,question:"Ambiente di sviluppo usato solo dalle 9 alle 17 dal lunedì al venerdì. Quale modello di pricing per il massimo risparmio?",options:["Pay-as-you-go con schedule automatici di shutdown/startup","Azure Hybrid Benefit","Reserved Instance 1 anno","Reserved Instance 3 anni"],correct:0,explanation:"PAYG + auto-shutdown = paghi solo per 40 ore/settimana (non 168). 76% di risparmio sul calcolo."},
{id:"H29",domain:2,question:"Il team di sviluppo deve distribuire una web app concentrandosi sulla scrittura del codice, senza gestire l'infrastruttura. Serve auto-scaling e load balancing integrato. Quale servizio?",options:["Azure Functions","Azure Virtual Machines","Azure Container Instances","Azure App Service"],correct:3,explanation:"App Service = PaaS per web app. Nessuna gestione infrastruttura. Auto-scaling e load balancing integrati."},
{id:"H30",domain:3,question:"Migrazione di 50 server fisici. Serve scoprire le dipendenze, ottenere stime dei costi Azure e raccomandazioni di dimensionamento. Quale servizio?",options:["Azure Migrate","Azure Advisor","Defender for Cloud","Azure Monitor"],correct:0,explanation:"Azure Migrate = scoperta, valutazione e migrazione. Mappatura dipendenze e stime dei costi."},
{id:"H31",domain:2,question:"Permettere a utenti di un'azienda partner di accedere alla tua app senza creare account nella tua directory. Il partner gestisce le proprie credenziali. Quale funzionalità Entra?",options:["Conditional Access","Entra B2C","Entra B2B collaboration","Entra Domain Services"],correct:2,explanation:"B2B = invitare partner esterni come utenti guest. Usano le proprie credenziali aziendali."},
{id:"H32",domain:2,question:"Un'azienda deve archiviare grandi quantità di dati non strutturati (immagini, video, log). Accesso frequente il primo mese, raramente dopo. Minimizzare i costi. Quale soluzione?",options:["Azure Files Premium → Standard","Azure Queue Storage","Azure Table Storage","Azure Blob Storage con policy di gestione ciclo di vita"],correct:3,explanation:"Blob Storage con lifecycle management sposta automaticamente i blob da Hot → Cool dopo 30 giorni."},
{id:"H33",domain:3,question:"Più reparti (Marketing, Finanza, IT). Il CFO vuole report mensili dei costi suddivisi per reparto. Modo più efficace?",options:["Applicare tag con nomi dei reparti → filtrare analisi costi per tag","Defender for Cloud","Resource group separati + calcolo manuale","Subscription separate per reparto"],correct:0,explanation:"Tag = metadati chiave-valore. Cost Management supporta nativamente il filtraggio/raggruppamento per tag."},
{id:"H34",domain:2,question:"Un'azienda vuole fornire a 500 dipendenti remoti desktop Windows 11 e app M365, gestiti centralmente, sicurezza consistente, hardware dispositivi minimo. Quale soluzione?",options:["VM Azure con RDP per utente","Azure App Service","M365 Business Premium con installazioni locali","Azure Virtual Desktop"],correct:3,explanation:"AVD = desktop virtuali Windows nel cloud. Multi-sessione, gestione centralizzata, accesso da qualsiasi dispositivo."},
{id:"H35",domain:3,question:"Migrazione dall'on-prem. Il direttore IT vuole capire i potenziali risparmi sui costi a 5 anni confrontando on-prem vs Azure. Quale strumento?",options:["Calcolatore dei prezzi Azure (Pricing Calculator)","Calcolatore TCO (deprecato agosto 2025)","Azure Cost Management","Azure Advisor"],correct:0,explanation:"Il Pricing Calculator è ora lo strumento raccomandato per tutte le stime di costo, incluse le migrazioni."},
{id:"H36",domain:3,question:"Tutte le VM su più subscription devono avere tag specifici (Department, CostCenter, Owner) prima della creazione. Quale funzionalità di governance?",options:["Resource lock","RBAC","Azure Policy","Management group"],correct:2,explanation:"Azure Policy impone tag obbligatori. Policy integrata: 'Richiedi un tag sulle risorse'."},
{id:"H37",domain:1,question:"Un'azienda tiene alcune app on-prem (normativa) e migra altre su Azure con autenticazione senza interruzioni. Quale modello di deployment?",options:["Cloud pubblico","Cloud ibrido","Cloud privato","Cloud comunitario"],correct:1,explanation:"Cloud ibrido = on-prem + cloud pubblico. Integrazione tramite Entra Connect per autenticazione."},
{id:"H38",domain:2,question:"Il direttore IT vuole un'autenticazione che elimini le password fornendo autenticazione forte. Quale metodo?",options:["Domande di sicurezza","Windows Hello for Business","Username + password complessa + rotazione","MFA via SMS"],correct:1,explanation:"Windows Hello = passwordless. Biometrico (viso/impronta) o PIN legato al dispositivo. Resistente al phishing."},
{id:"H39",domain:3,question:"Distribuire ambienti dev, test, prod identici. Stesse VM, storage, VNet. Garantire consistenza, minimizzare errori manuali. Quale funzionalità?",options:["Dashboard Portale Azure","Azure Policy","Resource group","Template ARM"],correct:3,explanation:"Template ARM = IaC. Definisci una volta, distribuisci identicamente in tutti gli ambienti."},
{id:"H40",domain:2,question:"Due VNet in regioni diverse devono comunicare direttamente tramite IP privati. Quale soluzione?",options:["Azure DNS","Subnet condivisa","Peering di reti virtuali","Azure VPN Gateway site-to-site"],correct:2,explanation:"VNet peering globale = connetti VNet tra regioni via backbone Microsoft. IP privati, bassa latenza."},
{id:"H41",domain:1,question:"Un'azienda retail deve prevedere la spesa cloud annuale con precisione (varianza entro il 5%) per la pianificazione del budget. Quale beneficio del cloud?",options:["Alta disponibilità","Disaster recovery","Prevedibilità delle prestazioni","Prevedibilità dei costi"],correct:3,explanation:"Prevedibilità dei costi = capacità di prevedere e controllare la spesa cloud tramite strumenti come Cost Management."},
{id:"H42",domain:3,question:"Il responsabile IT vuole essere notificato quando Azure pianifica manutenzione sulle VM + analisi causa radice per interruzioni di servizio. Quale servizio?",options:["Azure Service Health","Defender for Cloud","Azure Monitor","Azure Advisor"],correct:0,explanation:"Service Health = stato piattaforma Azure. Problemi di servizio, manutenzione pianificata, advisory."},
{id:"H43",domain:2,question:"Migrazione server app on-prem: servono 8 vCPU, 32 GB RAM, Windows Server 2022, controllo completo dell'OS, software personalizzato. Cosa raccomandare?",options:["Azure Virtual Machines","Azure Functions","Azure Container Instances","Azure App Service"],correct:0,explanation:"VM = IaaS. Controllo completo dell'OS. Installazione software personalizzato. Specifiche esatte."},
{id:"H44",domain:2,question:"Più microservizi con traffico imprevedibile, scaling indipendente necessario, containerizzati con dipendenze, minimizzare la gestione. Quale opzione di calcolo?",options:["Azure App Service","Azure Kubernetes Service (AKS) con auto-scaling","VM Azure con scaling manuale","Azure Container Instances"],correct:1,explanation:"AKS = orchestrazione container enterprise. Scaling indipendente per microservizio. Self-healing."},
{id:"H45",domain:2,question:"App mobile che elabora upload di immagini, picchi imprevedibili, pagare solo durante l'elaborazione. Quale soluzione di calcolo?",options:["VM Azure con auto-scaling","Azure Container Instances","Azure App Service (Always On)","Azure Functions con piano consumo"],correct:3,explanation:"Functions piano consumo = serverless, pay-per-execution. Costo zero quando inattivo. Auto-scale su domanda."},
{id:"H46",domain:3,question:"Stimare il costo mensile per 5 VM, 2 SQL DB, 10 TB blob storage in 2 regioni PRIMA del deployment. Quale strumento?",options:["Calcolatore dei prezzi Azure","Azure Cost Management","Azure Advisor","Calcolatore TCO"],correct:0,explanation:"Pricing Calculator = stima dei costi PRIMA del deployment. Aggiungi servizi, configura, ottieni stima."},
{id:"H47",domain:2,question:"App business-critical che deve sopravvivere a guasto di datacenter ma NON a disastro regionale. Minimizzare i costi. Quale ridondanza storage?",options:["LRS","ZRS (Zone-Redundant Storage)","GRS","GZRS"],correct:1,explanation:"ZRS = 3 copie su zone di disponibilità nella stessa regione. Sopravvive a guasto datacenter. Più economico di GRS/GZRS."},
{id:"H48",domain:2,question:"Un'app business-critical deve restare disponibile anche se un'intera REGIONE Azure fallisce. Serve replica automatica in posizione secondaria. Quale funzionalità?",options:["Coppie regionali Azure","Availability Set in più regioni","Resource group su più regioni","Zone di disponibilità in una regione"],correct:0,explanation:"Le coppie regionali = due regioni accoppiate per DR. Azure replica automaticamente certi servizi (GRS)."},
{id:"H49",domain:3,question:"Risorse Azure in esecuzione da 6 mesi. Il responsabile IT vuole identificare opportunità per ridurre i costi, migliorare la sicurezza e ottimizzare le prestazioni. Quale servizio?",options:["Azure Advisor","Azure Service Health","Azure Monitor","Defender for Cloud"],correct:0,explanation:"Advisor = raccomandazioni personalizzate su 5 categorie (Costo, Sicurezza, Affidabilità, Eccellenza Operativa, Prestazioni)."},
{id:"H50",domain:2,question:"Un'azienda retail sta costruendo un'app mobile per account clienti con login tramite social media (Facebook, Google, email). Nessuna credenziale aziendale. Quale servizio?",options:["Microsoft Entra B2B","Microsoft Entra B2C","Microsoft Entra Domain Services","Microsoft Entra ID (tenant standard)"],correct:1,explanation:"B2C = business-to-consumer. Provider di identità social (Facebook, Google, LinkedIn). Registrazione self-service."}
];
function convertItH(){return IT_H_QUESTIONS.map(q=>{const opts=q.options.map((text,i)=>({letter:"ABCD"[i],text,correct:i===q.correct}));return{id:q.id,question:q.question,options:opts,explanation:q.explanation,domain:q.domain,multi:false,source:"practice"};});}

const IT_F_QUESTIONS=[
{id:"F1",domain:2,question:"La tua azienda ha datacenter a Los Angeles e New York. Stai configurando i due datacenter come siti geo-cluster per la resilienza. Devi raccomandare un'opzione di ridondanza storage Azure con questi requisiti: (1) dati su più nodi, (2) nodi in posizioni geografiche separate, (3) dati leggibili dalla posizione secondaria. Quale opzione?",options:["GRS (Geo-redundant storage)","RA-GRS (Read-access geo-redundant storage)","ZRS (Zone-redundant storage)","LRS (Locally redundant storage)"],correct:1,explanation:"Solo RA-GRS soddisfa tutti i requisiti: geo-replicato tra regioni E leggibile dalla secondaria tramite suffisso URL -secondary."},
{id:"F2",domain:3,question:"La tua azienda vuole sottoscrivere un piano di supporto Azure. Il piano deve permettere l'apertura di nuovi ticket di supporto tecnico. Quali piani lo consentono? (Seleziona tutti)",options:["Basic","Developer","Standard","Professional Direct"],correct:1,explanation:"Basic NON permette ticket tecnici. Developer, Standard, Professional Direct e Premier li permettono tutti."},
{id:"F3",domain:3,question:"Il piano Basic della tua azienda non supporta la valutazione del design dell'ambiente Azure. Raccomandi di sottoscrivere il piano Professional Direct. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Una valutazione formale del design richiede il supporto Premier/Unified con un TAM dedicato."},
{id:"F4",domain:1,question:"Devi distribuire macchine virtuali Azure. Usi Software as a Service (SaaS) come soluzione. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Le VM Azure sono IaaS. SaaS è un'applicazione completamente gestita (es. Microsoft 365)."},
{id:"F5",domain:1,question:"Devi distribuire macchine virtuali Azure. Usi Platform as a Service (PaaS) come soluzione. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. PaaS astrae OS e infrastruttura. Le VM richiedono IaaS."},
{id:"F6",domain:1,question:"Devi distribuire macchine virtuali Azure. Usi Infrastructure as a Service (IaaS) come soluzione. Soddisfa l'obiettivo?",options:["Sì","No"],correct:0,explanation:"Sì. Le VM Azure sono IaaS — affitti l'hardware e gestisci OS, middleware e applicazioni."},
{id:"F7",domain:2,question:"I tuoi sviluppatori hanno creato 10 web app che devono essere ospitate su Azure. Requisiti: domini personalizzati, 10 GB storage ciascuna, istanze di calcolo dedicate, load balancing incluso, costi minimi. Quale piano web tier?",options:["Standard","Basic","Free","Shared"],correct:0,explanation:"Standard fornisce 50 GB storage, calcolo dedicato, domini personalizzati, auto-scale con load balancing integrato."},
{id:"F8",domain:3,question:"Stai migrando l'azienda ad Azure. Ogni divisione avrà un admin per le risorse. Vuoi segmentare Azure per le divisioni con minimo sforzo amministrativo. Usi più directory Azure AD. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Più directory AD aumentano lo sforzo. Usa Management Group o più Subscription in un singolo tenant con RBAC."},
{id:"F9",domain:2,question:"Web app per la filiale di Miami. Requisiti: URL miami.weyland.com, 2 istanze, SSL, 12 GB storage, costi minimi. Quale piano web tier?",options:["Standard","Basic","Free","Shared"],correct:0,explanation:"Standard fornisce 50 GB storage, SSL, domini personalizzati, fino a 10 istanze. Basic ha solo 10 GB (insufficiente)."},
{id:"F10",domain:1,question:"Migrazione VM a subscription pay-as-you-go. Usi il modello di spesa 'elastico'. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Il 'modello elastico' non esiste come concetto di pricing. Il modello corretto è OpEx (spesa operativa)."},
{id:"F11",domain:1,question:"Migrazione VM a subscription pay-as-you-go. Usi il modello di spesa 'scalabile'. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Il 'modello scalabile' non esiste. I due modelli sono CapEx e OpEx. Pay-as-you-go = OpEx."},
{id:"F12",domain:1,question:"Migrazione VM a subscription pay-as-you-go. Usi il modello di spesa operativa (OpEx). Soddisfa l'obiettivo?",options:["Sì","No"],correct:0,explanation:"Sì. Pay-as-you-go = OpEx. Paghi le risorse man mano che le consumi, nessun investimento hardware iniziale."},
{id:"F13",domain:2,question:"Devi distribuire una soluzione AI in Azure per costruire, testare e distribuire analisi predittive. Usi Azure Cosmos DB. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Cosmos DB è un database NoSQL. Per analisi predittive serve Azure Machine Learning."},
{id:"F14",domain:2,question:"La tua azienda migra tutte le risorse di rete ad Azure. Vuoi minimizzare l'impatto sugli utenti. Sincronizzi tutti gli account AD on-premises con Azure AD. Soddisfa l'obiettivo?",options:["Sì","No"],correct:0,explanation:"Sì. Sincronizzare AD on-premises con Entra ID tramite Entra Connect preserva identità, credenziali e SSO."},
{id:"F15",domain:2,question:"Devi distribuire una soluzione AI per analisi predittive. Usi Azure Machine Learning Studio. Soddisfa l'obiettivo?",options:["Sì","No"],correct:0,explanation:"Sì. Azure Machine Learning fornisce il ciclo completo ML: costruire, addestrare, testare e distribuire modelli predittivi."},
{id:"F16",domain:3,question:"Ogni business unit necessita risorse Azure identiche per le operazioni quotidiane. Devi automatizzare la creazione. Usi Azure API Management. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. API Management gestisce le API, non crea risorse Azure. Usa template ARM o Bicep."},
{id:"F17",domain:3,question:"Devi creare risorse Azure automaticamente per ogni business unit. Usi i management group. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. I Management Group organizzano le subscription, non creano risorse. Usa template ARM o Bicep."},
{id:"F18",domain:3,question:"Devi creare risorse Azure automaticamente per ogni business unit. Usi i template Azure Resource Manager. Soddisfa l'obiettivo?",options:["Sì","No"],correct:0,explanation:"Sì. I template ARM sono file JSON IaC dichiarativi per deployment automatizzati e ripetibili."},
{id:"F19",domain:2,question:"Devi distribuire un'app LOB critica su VM con disponibilità garantita del 99,99%. Minimo VM e zone. Usi 2 VM e 1 zona di disponibilità. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. 2 VM in 1 zona = solo 99,95% SLA. Per 99,99% servono almeno 2 VM su 2 zone di disponibilità."},
{id:"F20",domain:2,question:"Stessa app LOB critica, 99,99% disponibilità. Usi 1 VM e 2 zone di disponibilità. Soddisfa l'obiettivo?",options:["Sì","No"],correct:1,explanation:"No. Una singola VM non può estendersi su 2 zone ed è un single point of failure. Servono almeno 2 VM su 2 zone."},
{id:"F21",domain:3,question:"Per passare da CapEx a OpEx con spese prevedibili, il CIO suggerisce Azure. Il CFO teme spese OpEx imprevedibili. Quale opzione di pricing riduce i costi e rende le previsioni più facili?",options:["Azure Reservations","Pay-as-you-go (PAYG)","Azure VM Scale Sets","Azure in CSP"],correct:0,explanation:"Le Reservations forniscono impegni 1-3 anni con sconti fino al 72% — costi prevedibili e risparmi."},
{id:"F22",domain:1,question:"Una piccola startup usa Office 365 e Azure per tutti i servizi. Quale modello cloud ha scelto?",options:["Cloud privato","Cloud pubblico","Cloud ibrido","Cloud governativo"],correct:1,explanation:"Office 365 e Azure sono servizi cloud pubblici — infrastruttura condivisa, multi-tenant, pay-as-you-go."},
{id:"F23",domain:1,question:"Quale delle seguenti affermazioni è vera per una soluzione SaaS?",options:["Sei responsabile della manutenzione dell'infrastruttura","Sei responsabile della distribuzione degli aggiornamenti","Sei responsabile della disponibilità e scalabilità","Sei responsabile della configurazione delle funzionalità"],correct:3,explanation:"In SaaS, il provider gestisce infrastruttura, aggiornamenti, disponibilità e scalabilità. Tu solo configuri le funzionalità."},
{id:"F24",domain:1,question:"L'azienda ospita applicazioni in infrastruttura virtualizzata condivisa on-premises con Hyper-V. Quale modello cloud?",options:["Cloud ibrido","Cloud privato","Cloud pubblico","Cloud governativo"],correct:1,explanation:"Hyper-V on-premises con virtualizzazione condivisa = Cloud privato — infrastruttura dedicata a una singola organizzazione."},
{id:"F25",domain:3,question:"Azure SQL Database e un cluster SQL on-premises rappresentano rispettivamente una spesa ___ e una spesa ___.",options:["Capitale, Capitale","Capitale, Operativa","Operativa, Operativa","Operativa, Capitale"],correct:3,explanation:"Azure SQL Database = cloud = OpEx. Cluster SQL on-premises = hardware fisico = CapEx."},
{id:"F26",domain:1,question:"In Azure paghi solo per quello che usi. Questo è noto come:",options:["Modello a prezzo fisso","Modello basato sul consumo"],correct:1,explanation:"Pagare solo per ciò che usi = modello basato sul consumo. Principio fondamentale del cloud."},
{id:"F27",domain:1,question:"L'azienda esegue app in VM Azure. Quale modello di servizio cloud?",options:["SaaS","PaaS","IaaS","FaaS"],correct:2,explanation:"Le VM Azure = IaaS. Affitti l'hardware e gestisci l'OS e tutto il resto."},
{id:"F28",domain:1,question:"Azure App Service, Azure SQL Database e Cosmos DB sono esempi di quale servizio cloud?",options:["FaaS","SaaS","PaaS","IaaS"],correct:2,explanation:"App Service, SQL Database e Cosmos DB sono tutti PaaS — il provider gestisce l'infrastruttura."},
{id:"F29",domain:1,question:"Devi fornire capacità aggiuntiva oltre al datacenter on-premises. La soluzione deve minimizzare CapEx e OpEx. Quale soluzione?",options:["Migrazione a cloud pubblico","Cloud privato","Cloud ibrido","Server on-premises aggiuntivi"],correct:2,explanation:"Cloud ibrido minimizza sia CapEx (burst al cloud pubblico) sia OpEx (mantieni on-prem per il baseline)."},
{id:"F30",domain:1,question:"Office 365, VM Azure e Event Grid rappresentano rispettivamente:",options:["SaaS, PaaS, IaaS","PaaS, IaaS, SaaS","SaaS, IaaS, PaaS"],correct:2,explanation:"Office 365 = SaaS, Azure VMs = IaaS, Event Grid = PaaS/Serverless."},
{id:"F31",domain:2,question:"L'azienda ospita database per web app clienti in Azure MySQL Database. Quale modello cloud?",options:["SaaS","PaaS","IaaS","FaaS"],correct:1,explanation:"Azure MySQL Database è un servizio database gestito = PaaS. Il provider gestisce OS, patching, backup."},
{id:"F32",domain:1,question:"Un'app legacy su Azure VM Scale Set funziona al 30% normalmente ma raggiunge il 90% a fine mese. Azure permette di gestire questi picchi pagando la capacità aggiuntiva solo quando serve. Esempio di:",options:["Scalabilità","Elasticità","Tolleranza ai guasti","Alta disponibilità"],correct:1,explanation:"Elasticità = scalare automaticamente in base alla domanda. Scalabilità è la capacità generale; elasticità è la risposta automatica."},
{id:"F33",domain:1,question:"L'azienda pianifica di migrare le VM SQL on-premises ad Azure. Quale modello di spesa implementa?",options:["Capitale (CAPEX)","Operativa (OPEX)","Subscription","Elastico"],correct:1,explanation:"Passare ad Azure = pay-as-you-go = OpEx."},
{id:"F34",domain:1,question:"Un'analisi mostra che archiviare 2TB in Azure è più economico dell'on-premises. Il costo unitario diminuisce ulteriormente con la crescita dell'archivio. Esempio di:",options:["Elasticità","Economie di scala","Scalabilità","Alta disponibilità"],correct:1,explanation:"Costo unitario che diminuisce con la scala = economie di scala. I provider cloud trasferiscono i risparmi ai clienti."},
{id:"F35",domain:2,question:"Un'azienda di servizi finanziari deve automatizzare processi aziendali in ambiente low-code con interfaccia visuale e connettività integrata a SalesForce e SAP. Il team è di citizen developer. Quale servizio?",options:["Power Automate","Logic Apps","Azure Automation","Azure Functions"],correct:0,explanation:"Power Automate = low-code, interfaccia visuale, connettori integrati (SalesForce, SAP), progettato per citizen developer."},
{id:"F36",domain:2,question:"Kelly vuole automatizzare un'attività con uno script, con minimo costo e manutenzione. Ha scelto Azure Functions invece di VM Azure (IaaS). Soddisfa i criteri?",options:["Sì","No"],correct:0,explanation:"Sì. Functions sono serverless — pay per execution, nessuna gestione VM, ideali per script con costo e manutenzione minimi."},
{id:"F37",domain:2,question:"Un'app LOB richiede accesso a una condivisione file. Devi ospitarla in Azure con costo e sforzo amministrativo minimi. Quale servizio?",options:["Azure Files","Azure Blob Storage","VM Azure","VM Scale Sets"],correct:0,explanation:"Azure Files = condivisione file completamente gestita SMB. Costo e sforzo admin inferiori a una VM con file share."},
{id:"F38",domain:3,question:"Il team IT deve garantire che i deployment di risorse Azure siano identici ogni volta. Quale strumento per automatizzare il deployment?",options:["Azure API Management","Management Group","Template ARM","Azure Synapse"],correct:2,explanation:"I template ARM sono IaC dichiarativi — definisci una volta, distribuisci identicamente ogni volta."},
{id:"F39",domain:3,question:"Stai testando software in una VM Azure. Quando finisci, spegni la VM che mostra stato 'Arrestata' nel portale. Continuerai a sostenere costi?",options:["Sì","No"],correct:0,explanation:"Sì. Una VM 'Arrestata' (non deallocata) continua a generare costi per storage. Per fermare la fatturazione devi deallocare la VM."},
{id:"F40",domain:2,question:"Stai distribuendo più istanze di un'app web in regioni Azure diverse. Puoi distribuire risorse in più regioni Azure in un singolo resource group?",options:["Sì","No"],correct:0,explanation:"Sì. Un resource group è un contenitore logico — le risorse al suo interno possono essere in regioni diverse."},
{id:"F41",domain:2,question:"Quale soluzione raccomanderesti per l'esecuzione on-demand di attività automatizzate in Python con spesa minima?",options:["Azure Monitor","Azure Cloud Shell","Azure Automation","Azure Functions"],correct:3,explanation:"Azure Functions = serverless, esecuzione on-demand, pay-per-use, supporta Python. L'opzione più economica."},
{id:"F42",domain:3,question:"Quale servizio Azure usi per correlare eventi da più risorse Azure in un repository centrale?",options:["Azure Data Lake","Azure Log Analytics","Azure Event Grid","Azure Event Hub"],correct:1,explanation:"Azure Log Analytics è il repository centrale per interrogare e correlare i log da più risorse Azure usando KQL."},
{id:"F43",domain:2,question:"Quale elemento protegge contro guasti a livello di datacenter?",options:["Availability Set","Availability Zone","VM Scale Set","VM Azure"],correct:1,explanation:"Availability Zone = datacenter fisicamente separato in una regione. Protegge da guasti a livello di datacenter."},
{id:"F46",domain:2,question:"Quale tier di storage in Azure Storage ha il costo di archiviazione dati più alto?",options:["Hot","Cool","Cold","Archive"],correct:0,explanation:"Hot = costo di archiviazione più alto ma costo di accesso più basso. Per dati ad accesso frequente."},
{id:"F47",domain:3,question:"L'azienda pianifica di spostare diversi database SQL su Azure SQL Database. Il CIO chiede uno strumento per stimare il costo. Si suggerisce il Calcolatore dei prezzi Azure. Soddisfa i criteri?",options:["Sì","No"],correct:0,explanation:"Sì. Il Pricing Calculator stima i costi prima del deployment — esattamente ciò che serve al CIO."},
{id:"F48",domain:2,question:"Quale tier di storage ha il costo di archiviazione dati più basso?",options:["Hot","Cool","Cold","Archive"],correct:3,explanation:"Archive = costo di archiviazione più basso ma costo di accesso più alto e latenza massima (offline, richiede reidratazione)."},
{id:"F49",domain:2,question:"Hai un'app mobile che scambia molti messaggi con dispositivi. Quale tipo di storage è ottimizzato per grandi quantità di messaggi accessibili via HTTP/HTTPS?",options:["Blob Storage","Queue Storage","Table Storage","File Storage"],correct:1,explanation:"Queue Storage archivia grandi quantità di messaggi accessibili via HTTP/HTTPS. Per elaborazione asincrona."},
{id:"F50",domain:3,question:"Il team sicurezza vuole applicare configurazione basata su policy in più subscription Azure. Quale strumento?",options:["Resource Group","Management Group","RBAC","Access Policy"],correct:1,explanation:"I Management Group stanno sopra le subscription e permettono di applicare policy e RBAC su più subscription."},
{id:"F51",domain:2,question:"L'azienda implementa cloud ibrido e deve connettere risorse applicative on-premises. La soluzione deve minimizzare la latenza e massimizzare la sicurezza. Quale opzione?",options:["VPN Point-to-Site","VPN Site-to-Site","ExpressRoute","Azure Application Gateway"],correct:2,explanation:"ExpressRoute = connessione dedicata privata, latenza minima, sicurezza massima (no internet pubblico)."},
{id:"F52",domain:2,question:"Per un deployment ibrido pilota su piccola scala, devi connettere il datacenter on-premises ad Azure minimizzando i costi. Quale opzione?",options:["VPN Point-to-Site","VPN Site-to-Site","ExpressRoute","Azure Application Gateway"],correct:1,explanation:"VPN Site-to-Site = tunnel crittografato su internet, costo inferiore a ExpressRoute. Ideale per deployment pilota."},
{id:"F53",domain:2,question:"Per conformità normativa, devi garantire che le web app aziendali usino TLS 1.2. Azure App Service supporta questo requisito?",options:["Sì","No"],correct:0,explanation:"Sì. Azure App Service supporta l'imposizione della versione TLS minima nelle impostazioni di configurazione."},
{id:"F54",domain:2,question:"Un'app legacy richiede una condivisione file SMB accessibile tramite percorso UNC. Lo sforzo amministrativo deve essere minimo. Quale servizio?",options:["OneDrive","SharePoint","VM Azure con file share","Azure Files"],correct:3,explanation:"Azure Files = condivisione file SMB completamente gestita, accessibile tramite percorso UNC. Sforzo admin minimo."},
{id:"F55",domain:2,question:"Lo storage per le VM Azure è ospitato in quale tipo di Azure Storage?",options:["File","Table","Disk","Blob"],correct:2,explanation:"Azure Disk Storage (dischi gestiti) ospita i dischi OS e dati delle VM."},
{id:"F56",domain:3,question:"L'IT vuole configurare subscription Azure separate per diversi ambienti (produzione, sviluppo, test). Si possono associare più subscription allo stesso tenant Entra ID?",options:["Sì","No"],correct:0,explanation:"Sì. Più subscription Azure possono essere associate allo stesso tenant Entra ID."},
{id:"F57",domain:2,question:"L'azienda crea documenti con dati sensibili dei clienti (PII). L'accesso deve essere limitato al personale finanziario ovunque il documento venga spostato. Quale servizio?",options:["Microsoft Defender for Cloud Apps","Microsoft Defender for Endpoint","Microsoft Purview","Entra ID Conditional Access"],correct:2,explanation:"Microsoft Purview classifica e protegge dati sensibili con etichette di sensibilità che viaggiano con il documento."},
{id:"F58",domain:2,question:"Una ___ Azure è un insieme di datacenter distribuiti all'interno di un perimetro definito dalla latenza, collegati da una rete regionale dedicata a bassa latenza.",options:["Availability Zone","Regione","Geografia","Datacenter"],correct:1,explanation:"Una Regione Azure = insieme di datacenter connessi da una rete dedicata a bassa latenza."},
{id:"F59",domain:2,question:"Quale opzione di ridondanza storage Microsoft raccomanda per massima ridondanza e recuperabilità?",options:["LRS","GRS","ZRS","GZRS"],correct:3,explanation:"GZRS combina ZRS nella regione primaria + replica GRS nella secondaria = massima ridondanza (16 nines)."},
{id:"F71",domain:2,question:"Le VM Azure in reti virtuali diverse possono comunicare per impostazione predefinita.",options:["Vero","Falso"],correct:1,explanation:"Falso. Le VNet sono isolate per default. Serve VNet Peering o VPN Gateway per connetterle."},
{id:"F72",domain:2,question:"Quale soluzione Microsoft supporta l'autenticazione passwordless su sistemi Windows 10 e 11?",options:["Entra ID Conditional Access","Microsoft Authenticator","Windows Hello for Business","Microsoft Purview"],correct:2,explanation:"Windows Hello for Business fornisce autenticazione passwordless su Windows 10/11 con biometrica o PIN legato al dispositivo."},
{id:"F75",domain:3,question:"Devi definire e imporre standard aziendali per deployment di risorse Azure nuovi ed esistenti in tutte le subscription. Cosa usare?",options:["Azure Policy","Microsoft Defender for Cloud","Microsoft Sentinel","Azure Advisor"],correct:0,explanation:"Azure Policy definisce e impone standard su tutti i deployment di risorse Azure."},
{id:"F78",domain:3,question:"Devi impedire l'eliminazione accidentale di risorse Azure nella subscription. Quale funzionalità?",options:["RBAC","Resource Lock","Security group","Azure Policy"],correct:1,explanation:"I Resource Lock (Delete o ReadOnly) impediscono l'eliminazione accidentale indipendentemente dai permessi RBAC."},
{id:"F79",domain:3,question:"Stai creando risorse Azure con template ARM. Devi garantire che le risorse vengano create solo in regioni approvate. Cosa usare?",options:["Azure Lock","Azure Policy","Azure Blueprint","Microsoft Defender for Cloud"],correct:1,explanation:"Azure Policy con 'Posizioni consentite' limita la creazione di risorse alle regioni approvate."},
{id:"F80",domain:3,question:"L'IT assegna permessi a livello di resource group. Le risorse nel resource group ereditano questi permessi?",options:["Sì","No"],correct:0,explanation:"Sì. I permessi RBAC vengono ereditati verso il basso: Management Group → Subscription → Resource Group → Risorse."},
{id:"F82",domain:2,question:"Devi implementare MFA per gli utenti Entra ID, ma richiedere un fattore aggiuntivo solo quando gli utenti sono fuori da una posizione attendibile su un dispositivo non gestito. Quale funzionalità?",options:["Microsoft Purview","Identity Protection","Conditional Access","Privileged Identity Management"],correct:2,explanation:"Conditional Access crea policy basate su condizioni (posizione, stato dispositivo, livello di rischio)."},
{id:"F86",domain:2,question:"Quali sono i tre principi fondamentali di Zero Trust?",options:["Verifica esplicita, Privilegio minimo, Presumi la violazione","Verifica esplicita, Defense in depth, Presumi la violazione","Verifica esplicita, Fidarsi ma verificare, Presumi la violazione","Verifica esplicita, Privilegio minimo, La fiducia va guadagnata"],correct:0,explanation:"I tre principi Zero Trust: 1) Verifica esplicita, 2) Accesso con privilegio minimo (JIT/JEA), 3) Presumi la violazione."},
{id:"F87",domain:3,question:"L'azienda deve semplificare i deployment di nuovi ambienti includendo template ARM, accesso basato sui ruoli e policy. Quale servizio Azure permette deployment ripetibili?",options:["Azure Policy initiative","Azure Policy","Template ARM","Azure Blueprints"],correct:3,explanation:"Blueprints impacchetta template ARM, RBAC, policy e RG in definizioni riutilizzabili. NOTA: in fase di ritiro → Template Specs + Deployment Stacks."},
{id:"F90",domain:2,question:"Implementare Azure MFA garantisce di sapere chi è l'utente che afferma di essere. Questo è un esempio di:",options:["Autorizzazione","Autenticazione","Integrità","Riservatezza"],correct:1,explanation:"Autenticazione = verificare l'identità ('chi sei?'). MFA aggiunge fattori di verifica extra."},
{id:"F91",domain:2,question:"Devi garantire che condivisioni file on-premises e Azure Files restino sincronizzate in entrambe le direzioni. Quale strumento?",options:["AzCopy","Azure Storage Explorer","Azure File Sync","Azure Data Box"],correct:2,explanation:"Azure File Sync fornisce sincronizzazione bidirezionale tra file share on-premises e Azure Files."},
{id:"F93",domain:3,question:"L'azienda ha distribuito risorse in più regioni per varie business unit. Deve generare report di costi e chargeback per ogni business unit. Quale funzionalità Azure?",options:["Tag","Resource Lock","Resource Group","Management Group"],correct:0,explanation:"I Tag (coppie chiave-valore come 'BusinessUnit:Finance') permettono il tracciamento costi e il chargeback filtering."}

function convertItF(){return IT_F_QUESTIONS.map(q=>{const opts=q.options.map((text,i)=>({letter:"ABCDE"[i],text,correct:i===q.correct}));return{id:q.id,question:q.question,options:opts,explanation:q.explanation,domain:q.domain,multi:false,source:"examtopics"};});}


    return{id:q.id,question:q.question,options:opts,explanation:q.explanation,domain:q.domain,multi:false};
  });
}

/* Quiz */
function genPracticeQuiz(){
  const setup=S.qSetup;const pool=[];
  // Add questions from selected sources
  if(setup.sources.curated){
    // Use Italian translations if available, fallback to parsed
    const itQs=convertItQuestions();
    if(itQs.length)pool.push(...itQs);
    else pool.push(...S.allQuestions.curated);
  }
  if(setup.sources.practice){const itH=convertItH();if(itH.length)pool.push(...itH);else pool.push(...S.allQuestions.practice);}
  if(setup.sources.examtopics){const itF=convertItF();if(itF.length)pool.push(...itF);else pool.push(...S.allQuestions.examtopics);}
  if(setup.sources.ipspecialist)pool.push(...S.allQuestions.ipspecialist);
  if(setup.sources.flashcard){
    const fcQs=genFlashcardQuiz();pool.push(...fcQs);
  }
  // Filter by domain
  let filtered=pool;
  if(setup.domain!=='all'){
    const d=parseInt(setup.domain);
    filtered=pool.filter(q=>q.domain===d||q.domain===0);
  }
  // Filter by difficulty
  if(setup.difficulty==='wrong'){
    const wrongIds=new Set(Object.keys(S.qWrongHistory));
    const wrongFiltered=filtered.filter(q=>wrongIds.has(q.id));
    if(wrongFiltered.length)filtered=wrongFiltered;
  }
  if(!filtered.length)filtered=pool;
  // Limit by count
  const n=setup.count==='all'?filtered.length:Math.min(parseInt(setup.count),filtered.length);
  return shuffle([...filtered]).slice(0,n).map(q=>({...q,options:shuffle([...q.options])}));
}
function genFlashcardQuiz(){
  const byD={1:[],2:[],3:[],0:[]};S.cards.forEach(c=>(byD[c.domain]||byD[0]).push(c));
  const traps=byD[0]||[];traps.forEach(c=>{const d=guessDomain(c.id);if(byD[d])byD[d].push(c);});
  const pick=(a,n)=>shuffle([...a]).slice(0,n);
  const sel=[...pick(byD[1],11),...pick(byD[2],16),...pick(byD[3],13)];
  return shuffle(sel).map(card=>{
    const pool=S.cards.filter(c=>c.domain===card.domain&&c.id!==card.id);
    const dist=shuffle(pool).slice(0,3);
    const opts=shuffle([{letter:'A',text:shortA(card.answer),correct:true},...dist.map((d,i)=>({letter:'BCD'[i],text:shortA(d.answer),correct:false}))]);
    opts.forEach((o,i)=>o.letter='ABCD'[i]);
    return{id:'FC'+card.id,question:card.question,options:opts,explanation:card.answer,domain:card.domain,multi:false};
  });
}
function shortA(a){let t=a.replace(/\*\*/g,'').replace(/\n/g,' ');const d=t.indexOf('. ');if(d>0&&d<200)t=t.substring(0,d+1);else if(t.length>200)t=t.substring(0,197)+'…';return t;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* Spaced Rep */
function getStudyCards(filter){
  let pool=[...S.cards];
  if(filter&&filter!=='all')pool=pool.filter(c=>c.domain===parseInt(filter));
  pool.sort((a,b)=>{const sa=S.cardProg[a.id]?S.cardProg[a.id].status:'u',sb=S.cardProg[b.id]?S.cardProg[b.id].status:'u';
    const o={u:0,review:1,known:2};return(o[sa]||0)-(o[sb]||0);});
  return pool.filter(c=>{const p=S.cardProg[c.id];if(!p)return true;return true;});
}
function markCard(cid,knew){
  const intervals=[1,3,7];let p=S.cardProg[cid]||{status:'u',intervalIdx:0,nextSession:0};
  if(knew){p.status='known';p.intervalIdx=0;}
  else{const idx=Math.min(p.intervalIdx||0,intervals.length-1);p.status='review';p.intervalIdx=idx+1;p.nextSession=S.session+intervals[idx];}
  p.lastSeen=Date.now();S.cardProg[cid]=p;saveP();
}

function domainStats(d){
