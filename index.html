<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0078D4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AZ-900 Studio</title>
<style>
:root{
  --pri:#0078D4;--pri-d:#005a9e;--acc:#50E6FF;
  --bg:#f3f2f1;--bg2:#fff;--bg3:#e8e6e4;
  --tx:#323130;--tx2:#605e5c;--tx3:#a19f9d;
  --brd:#edebe9;--sh:0 2px 8px rgba(0,0,0,.07);
  --ok:#107c10;--warn:#ffb900;--err:#d13438;
  --r:14px;--purple:#8b5cf6;
}
[data-theme="dark"]{
  --bg:#1b1a19;--bg2:#292827;--bg3:#3b3a39;
  --tx:#e1dfdd;--tx2:#b3b0ad;--tx3:#797775;
  --brd:#484644;--sh:0 2px 8px rgba(0,0,0,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 8px;opacity:1;transform:translateY(0)}
.view.anim{animation:fadeUp .25s ease}
@keyframes fadeUp{from{transform:translateY(8px)}to{transform:translateY(0)}}
@keyframes flipIn{from{transform:rotateY(90deg)}to{transform:rotateY(0)}}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.hdr h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.hdr-logo{width:28px;height:28px;border-radius:6px;background:var(--pri);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
.hdr-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--bg);color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:active{background:var(--bg3)}
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--brd);padding:4px 0 max(4px,env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 4px;border:none;background:none;color:var(--tx3);font-size:10px;font-weight:600;cursor:pointer;transition:color .15s}
.nav-btn svg{width:22px;height:22px}
.nav-btn.act{color:var(--pri)}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--brd);padding:20px;margin-bottom:12px}
.card-sm{padding:14px 16px}
.card-title{font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:48px;padding:0 24px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;min-width:44px}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:active{background:var(--pri-d)}
.btn-sec{background:var(--bg3);color:var(--tx)}
.btn-sec:active{background:var(--brd)}
.btn-ghost{background:transparent;color:var(--pri);height:40px;padding:0 12px}
.btn-full{width:100%}
.btn-lg{height:56px;font-size:16px;border-radius:14px}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:#e6f4e6;color:var(--ok)}
.badge-warn{background:#fff4ce;color:#986f0b}
.badge-err{background:#fde7e9;color:var(--err)}
.badge-info{background:#e5f1fb;color:var(--pri)}
.badge-purple{background:#ede9fe;color:var(--purple)}
[data-theme="dark"] .badge-ok{background:#1a3a1a}
[data-theme="dark"] .badge-warn{background:#3a3010}
[data-theme="dark"] .badge-err{background:#3a1a1c}
[data-theme="dark"] .badge-info{background:#1a2a3a}
[data-theme="dark"] .badge-purple{background:#2a1a3a}
.prog-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring-label{position:absolute;font-size:15px;font-weight:700}
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;height:34px;padding:0 14px;border-radius:17px;border:1.5px solid var(--brd);background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;transition:all .15s}
.chip.act{background:var(--pri);color:#fff;border-color:var(--pri)}
.fc-wrap{perspective:800px;width:100%;min-height:260px;margin:12px 0;touch-action:pan-y}
.fc-inner{position:relative;width:100%;min-height:260px;transition:transform .5s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);padding:24px;display:flex;flex-direction:column;justify-content:center;min-height:260px}
.fc-front{background:var(--bg2);border:1px solid var(--brd);border-left:4px solid var(--pri)}
.fc-back{background:var(--bg2);border:1px solid var(--brd);border-left:4px solid var(--ok);transform:rotateY(180deg)}
.fc-domain{font-size:11px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.fc-q{font-size:17px;font-weight:600;line-height:1.5}
.fc-a{font-size:15px;line-height:1.6;color:var(--tx2)}
.fc-hint{text-align:center;color:var(--tx3);font-size:12px;margin-top:10px}
.fc-actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
.fc-btn{height:48px;flex:1;max-width:160px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.fc-btn-no{background:#fde7e9;color:var(--err)}
.fc-btn-yes{background:#e6f4e6;color:var(--ok)}
[data-theme="dark"] .fc-btn-no{background:#3a1a1c}
[data-theme="dark"] .fc-btn-yes{background:#1a3a1a}
.fc-swipe-hint{display:flex;justify-content:space-between;color:var(--tx3);font-size:11px;padding:0 4px;margin-top:4px}
.quiz-opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:12px;border:2px solid var(--brd);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5}
.quiz-opt:active{background:var(--bg3)}
.quiz-opt.sel{border-color:var(--pri);background:#e5f1fb}
[data-theme="dark"] .quiz-opt.sel{background:#1a2a3a}
.quiz-opt.correct{border-color:var(--ok);background:#e6f4e6}
.quiz-opt.wrong{border-color:var(--err);background:#fde7e9}
[data-theme="dark"] .quiz-opt.correct{background:#1a3a1a}
[data-theme="dark"] .quiz-opt.wrong{background:#3a1a1c}
.quiz-letter{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.quiz-prog{height:4px;border-radius:2px;background:var(--bg3);margin:12px 0;overflow:hidden}
.quiz-prog-fill{height:100%;background:var(--pri);border-radius:2px;transition:width .3s}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;font-weight:600;width:30px;flex-shrink:0;color:var(--tx2)}
.bar-track{flex:1;height:20px;border-radius:6px;background:var(--bg3);overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.bar-val{font-size:12px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
.line-chart{width:100%;overflow:hidden}
.line-chart svg{display:block}
.streak-num{font-size:36px;font-weight:800;color:var(--pri);line-height:1}
.streak-label{font-size:12px;color:var(--tx2);font-weight:600}
.map-domain{margin-bottom:16px}
.map-domain-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--brd);cursor:pointer}
.map-topic{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 24px;background:var(--bg2);border:1px solid var(--brd);border-top:none;cursor:pointer;transition:background .1s}
.map-topic:last-child{border-radius:0 0 var(--r) var(--r)}
.map-topic:active{background:var(--bg3)}
.map-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cs-search{width:100%;height:44px;padding:0 16px;border-radius:12px;border:1.5px solid var(--brd);background:var(--bg2);font-size:14px;color:var(--tx);font-family:inherit;outline:none;transition:border-color .15s}
.cs-search:focus{border-color:var(--pri)}
.cs-content{margin-top:12px}
.cs-content h1{font-size:20px;font-weight:700;margin:20px 0 10px;color:var(--pri)}
.cs-content h2{font-size:17px;font-weight:700;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--pri)}
.cs-content h3{font-size:15px;font-weight:700;margin:14px 0 6px}
.cs-content h4{font-size:14px;font-weight:700;margin:12px 0 4px}
.cs-content p{margin:8px 0;line-height:1.6;font-size:14px}
.cs-content strong{font-weight:700}
.cs-content code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Monaco,monospace}
.cs-content pre{background:var(--bg3);padding:12px 16px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.5;font-family:'SF Mono',Monaco,monospace}
.cs-content pre code{background:none;padding:0}
.cs-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.cs-content th{background:var(--pri);color:#fff;padding:8px 10px;text-align:left;font-size:12px;font-weight:600}
.cs-content td{padding:7px 10px;border-bottom:1px solid var(--brd)}
.cs-content tr:nth-child(even) td{background:var(--bg)}
.cs-content blockquote{border-left:3px solid var(--pri);padding:8px 14px;margin:10px 0;background:var(--bg);border-radius:0 8px 8px 0;font-size:13px;color:var(--tx2)}
.cs-content ul,.cs-content ol{margin:8px 0 8px 20px;font-size:14px;line-height:1.6}
.cs-content hr{border:none;border-top:1px solid var(--brd);margin:16px 0}
.cs-content li{margin:3px 0}
.result-big{font-size:48px;font-weight:800;line-height:1}
.result-pass{color:var(--ok)}
.result-fail{color:var(--err)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:13px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.divider{height:1px;background:var(--brd);margin:12px 0}
.empty-msg{text-align:center;padding:40px 20px;color:var(--tx3);font-size:14px;line-height:1.6}
.sub-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--bg3);color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-hdr h2{font-size:18px;font-weight:700;flex:1}
.view::-webkit-scrollbar{width:4px}
.view::-webkit-scrollbar-thumb{background:var(--tx3);border-radius:2px}
/* Glossary */
.gloss-item{padding:14px 16px;background:var(--bg2);border:1px solid var(--brd);margin-bottom:-1px}
.gloss-item:first-child{border-radius:var(--r) var(--r) 0 0}
.gloss-item:last-child{border-radius:0 0 var(--r) var(--r);margin-bottom:12px}
.gloss-term{font-size:14px;font-weight:700;color:var(--pri);margin-bottom:4px}
.gloss-def{font-size:13px;line-height:1.5;color:var(--tx2)}
/* Plan */
.plan-week{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.plan-week-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;font-weight:700;font-size:14px}
.plan-week-hdr:active{background:var(--bg3)}
.plan-tasks{padding:0 16px 12px}
.plan-task{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:13px;line-height:1.5;cursor:pointer}
.plan-task input{margin-top:3px;width:18px;height:18px;accent-color:var(--pri);cursor:pointer;flex-shrink:0}
.plan-task.done{color:var(--tx3);text-decoration:line-through}
/* Feature card */
.feat-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;text-align:center;min-height:80px}
.feat-card:active{background:var(--bg3);transform:scale(.97)}
.feat-card .feat-icon{font-size:24px}
.feat-card .feat-label{font-size:12px;font-weight:600;color:var(--tx2)}
/* Sim card */
.sim-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.sim-card:active{background:var(--bg3);transform:scale(.98)}
.quiz-opt.reveal-correct{border-color:var(--ok);background:#e6f4e6}
.quiz-opt.reveal-wrong{border-color:var(--err);background:#fde7e9}
[data-theme="dark"] .quiz-opt.reveal-correct{background:#1a3a1a}
[data-theme="dark"] .quiz-opt.reveal-wrong{background:#3a1a1c}
.quiz-explanation{margin-top:8px;padding:12px 16px;background:var(--bg);border-radius:12px;font-size:13px;line-height:1.6;color:var(--tx2);border-left:3px solid var(--pri)}
.mode-toggle{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--brd)}
.mode-toggle button{flex:1;padding:10px 8px;border:none;background:var(--bg2);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.mode-toggle button.act{background:var(--pri);color:#fff}
</style>
</head>
<body>
<div id="app"><div class="loader"><div class="spinner"></div><div style="font-size:14px;color:var(--tx2)">Caricamento AZ-900 Studio...</div></div></div>
<script>
(function(){
'use strict';
const GH='https://raw.githubusercontent.com/Prometeo91/EsameMicrosoft/main/';
const CORE_FILES={flashcards:'09-flashcards.md',cheatsheet:'05-cheat-sheet.md',errors:'07-statistiche-errori.md'};
const EXTRA_FILES={questions:'04a-domande-curate.md',questionsB:'04b-domande-ipspecialist.md',questionsC:'04c-domande-examtopics.md',questionsD:'04d-practice-test.md',glossary:'00-glossario.md',studyPlan:'08-piano-studio.md',simulations:'10-simulazioni-esame.md',study1:'01-cloud-concepts.md',study2:'02-azure-architecture-services.md',study3:'03-azure-management-governance.md'};
const SOURCES=[{id:'curated',label:'Curate (A,B,C,D,G)',stars:3,default:true},{id:'practice',label:'Practice Test (H)',stars:3,default:true},{id:'examtopics',label:'ExamTopics (F)',stars:2,default:true},{id:'ipspecialist',label:'IPSpecialist (E)',stars:1,default:false,warn:'Fonte meno affidabile — usala per volume extra'},{id:'flashcard',label:'Flashcard',stars:3,default:true}];
const PASS=70,QUIZ_N=40,LS='az900_';
const SUBTOPICS={
 1:[{id:'1.1',name:'Definizione cloud computing',h3s:['Concetti fondamentali del cloud','Modelli cloud']},{id:'1.2',name:'Vantaggi del cloud',h3s:['Benefici del cloud']},{id:'1.3',name:'Tipi di servizio cloud',h3s:['Shared Responsibility Model','IaaS, PaaS, SaaS','Serverless e Concetti Avanzati']}],
 2:[{id:'2.1',name:'Componenti architetturali',h3s:['Architettura Azure: regioni e zone','Gerarchia risorse']},{id:'2.2',name:'Compute e Networking',h3s:['Compute','Networking']},{id:'2.3',name:'Storage',h3s:['Storage']},{id:'2.4',name:'Identità e Sicurezza',h3s:['Identità e sicurezza']}],
 3:[{id:'3.1',name:'Gestione costi',h3s:['Gestione costi']},{id:'3.2',name:'Governance e compliance',h3s:['Governance e compliance']},{id:'3.3',name:'Strumenti di gestione',h3s:['Strumenti di gestione e deploy']},{id:'3.4',name:'Monitoraggio',h3s:['Strumenti di monitoraggio']}]
};
const DNAMES={1:'Cloud Concepts',2:'Azure Architecture & Services',3:'Management & Governance',0:'Trappole comuni'};

let S={
  view:'home',subView:null,darkMode:false,
  cards:[],cheatHtml:'',errorsHtml:'',
  dataLoaded:false,isOffline:!navigator.onLine,lastSync:null,loading:true,
  // Extra data
  mcqBank:[],glossary:[],studyPlanHtml:'',simulations:[],
  studyHtml:{1:'',2:'',3:''},
  extrasLoaded:false,extrasLoading:false,
  // Studio
  studioCards:[],stIdx:0,stFlipped:false,stFilter:'all',
  // Quiz
  quizQs:[],qIdx:0,qAnswers:{},qDone:false,qFlagged:new Set(),quizMode:'practice',
  allQuestions:{curated:[],practice:[],examtopics:[],ipspecialist:[]},
  qSetup:{sources:{curated:true,practice:true,examtopics:true,ipspecialist:false,flashcard:true},count:40,domain:'all',mode:'studio',difficulty:'all'},qShowSetup:true,qWrongHistory:{},
  // Persisted
  cardProg:{},quizHist:[],streak:{count:0,lastDate:null},wrongAns:{},session:0,
  planChecks:{},
  // modal
  modal:null
};

/* Storage */
function lsG(k,d){try{const v=localStorage.getItem(LS+k);return v?JSON.parse(v):d}catch(e){return d}}
function lsS(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch(e){}}
function loadP(){
  S.cardProg=lsG('cardProg',{});S.quizHist=lsG('quizHist',[]);S.streak=lsG('streak',{count:0,lastDate:null});
  S.wrongAns=lsG('wrongAns',{});S.darkMode=lsG('darkMode',false);S.session=lsG('session',0);
  S.lastSync=lsG('lastSync',null);S.planChecks=lsG('planChecks',{});S.qWrongHistory=lsG('qWrongHistory',{});
  if(S.darkMode)document.documentElement.setAttribute('data-theme','dark');
}
function saveP(){
  lsS('cardProg',S.cardProg);lsS('quizHist',S.quizHist);lsS('streak',S.streak);
  lsS('wrongAns',S.wrongAns);lsS('darkMode',S.darkMode);lsS('session',S.session);
  lsS('lastSync',S.lastSync);lsS('planChecks',S.planChecks);lsS('qWrongHistory',S.qWrongHistory);
}
function resetProgress(){S.cardProg={};S.quizHist=[];S.streak={count:0,lastDate:null};S.wrongAns={};S.session=0;S.planChecks={};S.qWrongHistory={};saveP();}
function updateStreak(){
  const t=new Date().toISOString().slice(0,10);
  if(S.streak.lastDate===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak.count=S.streak.lastDate===y?S.streak.count+1:1;
  S.streak.lastDate=t;saveP();
}

/* Data */
async function fetchFile(name){
  const c=lsG('c_'+name,null);
  try{const r=await fetch(GH+name);if(!r.ok)throw r;const t=await r.text();lsS('c_'+name,t);return t;}
  catch(e){return c;}
}
async function loadCore(force){
  S.loading=true;render();
  const cached=k=>lsG('c_'+CORE_FILES[k],null);
  if(!force&&cached('flashcards')&&cached('cheatsheet')&&cached('errors')){
    processCore(cached('flashcards'),cached('cheatsheet'),cached('errors'));
    S.loading=false;render();loadExtras(false);refreshCore();return;
  }
  try{
    const[fc,cs,er]=await Promise.all(Object.values(CORE_FILES).map(f=>fetchFile(f)));
    if(fc)processCore(fc,cs,er);
    S.lastSync=new Date().toISOString();S.isOffline=false;S.dataLoaded=true;S.loading=false;saveP();render();
    loadExtras(false);
  }catch(e){
    const fc=cached('flashcards');
    if(fc){processCore(fc,cached('cheatsheet'),cached('errors'));S.isOffline=true;S.loading=false;render();loadExtras(false);}
    else{S.loading=false;render();}
  }
}
function processCore(fc,cs,er){
  S.cards=parseFlashcards(fc||'');S.cheatHtml=renderMd(cs||'');S.errorsHtml=renderMd(er||'');S.dataLoaded=true;
}
async function refreshCore(){
  try{

async function loadExtras(force){
  if(S.extrasLoading)return;S.extrasLoading=true;
  const cached=k=>lsG('c_'+EXTRA_FILES[k],null);
  try{
    const files=Object.entries(EXTRA_FILES);

/* Flashcard Parser */
function parseFlashcards(md){
  const cards=[];let cD=0,cST='';const lines=md.split('\n');let i=0;
  while(i<lines.length){
    const L=lines[i];
    const h2=L.match(/^## (?:Dominio\s+)?(\d+)\s*[—–-]/);
    if(h2){cD=parseInt(h2[1]);cST='';i++;continue;}
    if(L.match(/^## Bonus/i)){cD=0;cST='Trappole comuni';i++;continue;}
    const h3=L.match(/^### (.+)/);if(h3){cST=h3[1].trim();i++;continue;}
    const cm=L.match(/^#### Card (\d+)/);
    if(cm){
      const id=parseInt(cm[1]);let q='',a='';i++;
      while(i<lines.length){
        const cl=lines[i];if(cl.match(/^#{1,4} /))break;
        const dm=cl.match(/\*\*D:\*\*\s*(.*)/);if(dm){q=dm[1].trim();i++;continue;}
        const am=cl.match(/\*\*R:\*\*\s*(.*)/);
        if(am){a=am[1].trim();i++;while(i<lines.length&&!lines[i].match(/^#{1,4} /)&&!lines[i].match(/\*\*D:\*\*/)){if(lines[i].trim())a+='\n'+lines[i].trim();i++;}continue;}
        i++;
      }
      if(q&&a)cards.push({id,domain:cD||guessDomain(id),subtopic:cST,question:q,answer:a});
      continue;
    }
    i++;
  }
  return cards;
}
function guessDomain(id){if(id<=35)return 1;if(id<=100)return 2;if(id<=137)return 3;return 0;}

/* MCQ Parser (04a format) */
function parseMCQ(md,source){
  const questions=[];const lines=md.split('\n');let i=0;
  // First pass: collect all questions
  const rawQs=[];
  while(i<lines.length){
    const qm=lines[i].match(/^\*\*([A-Z]\d+)\.\*\*\s*(.*)/);
    if(qm){
      const id=qm[1],qText=qm[2].trim();let opts=[];let fullQ=qText;i++;
      // Check for TRUE/FALSE
      if(fullQ.match(/TRUE\s*\/\s*FALSE/i)){
        opts=[{letter:'a',text:'True',textClean:'true'},{letter:'b',text:'False',textClean:'false'}];
      }
      while(i<lines.length){
        const ol=lines[i].match(/^[-\s]*([a-eA-E])\)\s*(.*)/);
        if(ol){opts.push({letter:ol[1],text:ol[2].trim(),textClean:ol[2].trim().toLowerCase()});i++;continue;}
        if(lines[i].match(/^\*\*[A-Z]\d+\.\*\*/)||lines[i].match(/^#{1,3}\s/)||lines[i].match(/^\|/))break;
        if(lines[i].trim()&&!fullQ.match(/TRUE\s*\/\s*FALSE/i))fullQ+=' '+lines[i].trim();
        i++;
      }
      if(opts.length>=2)rawQs.push({id,question:fullQ.replace(/\*\*/g,'').replace(/TRUE\s*\/\s*FALSE/i,'').trim(),options:opts});
      continue;
    }
    // Look for answer tables
    if(lines[i].match(/^\|\s*#\s*\|\s*(Answer|Risposta)/i)){
      i++;if(lines[i]&&lines[i].match(/^\|[-\s|]+\|$/))i++;
      while(i<lines.length&&lines[i].match(/^\|/)){
        const cells=lines[i].split('|').map(c=>c.trim()).filter(Boolean);
        if(cells.length>=3){
          const qId=cells[0].replace(/[⚠️\s]/g,'');
          const ans=cells[1].replace(/\*\*/g,'').trim().toLowerCase();
          const expl=cells.slice(2).join(' ').replace(/\*\*/g,'').replace(/⚠️/g,'').trim();
          const q=rawQs.find(rq=>rq.id===qId);
          if(q){
            // Handle multi-answer (e.g., "b, c")
            const answers=ans.split(/[,\s]+/).filter(a=>a.match(/^[a-e]$/i));
            q.correctLetters=answers;q.explanation=expl;
          }
        }
        i++;
      }
      continue;
    }
    i++;
  }
  // Convert to quiz format
  rawQs.forEach(q=>{
    if(!q.correctLetters||!q.correctLetters.length)return;
    const multi=q.correctLetters.length>1;
    questions.push({
      id:q.id,question:q.question,
      options:q.options.map(o=>({letter:o.letter.toUpperCase(),text:o.text,correct:q.correctLetters.includes(o.letter)})),
      explanation:q.explanation||'',multi,
      domain:q.id.startsWith('A')?1:q.id.startsWith('B')?2:q.id.startsWith('C')?3:0,
      source:source||'curated'
    });
  });
  return questions;
}

/* Simulation Parser */
function parseSims(md){
  const sims=[];const lines=md.split('\n');let i=0;
  let curSim=null;
  while(i<lines.length){
    const sm=lines[i].match(/^## Simulazione (\d+)\s*[—–-]\s*(.*)/);
    if(sm){
      if(curSim&&curSim.questions.length)sims.push(curSim);
      curSim={id:parseInt(sm[1]),title:sm[2].trim(),questions:[]};i++;continue;
    }
    if(!curSim){i++;continue;}
    const qm=lines[i].match(/^### Domanda (\d+)/);
    if(qm){
      const num=parseInt(qm[1]);let qText='';let opts=[];i++;
      while(i<lines.length){
        if(lines[i].match(/^### Domanda/)||lines[i].match(/^## /)||lines[i].match(/^### Soluzion/i))break;
        const ol=lines[i].match(/^([a-e])\)\s*(.*)/);
        if(ol){opts.push({letter:ol[1].toUpperCase(),text:ol[2].trim(),correct:false});i++;continue;}
        if(lines[i].trim()&&!lines[i].match(/^---/)&&opts.length===0)qText+=(qText?' ':'')+lines[i].trim();
        i++;
      }
      if(qText&&opts.length>=2)curSim.questions.push({num,question:qText,options:opts});
      continue;
    }
    // Solution table
    if(lines[i].match(/^\|\s*#\s*\|\s*(Risposta|Answer)/i)){
      i++;if(lines[i]&&lines[i].match(/^\|[-\s|:]+\|$/))i++;
      while(i<lines.length&&lines[i].match(/^\|/)){
        const cells=lines[i].split('|').map(c=>c.trim()).filter(Boolean);
        if(cells.length>=3){
          const num=parseInt(cells[0]);
          const ans=cells[1].replace(/\*\*/g,'').trim().toLowerCase();
          const expl=cells.slice(2).join(' ').trim();
          const q=curSim.questions.find(qq=>qq.num===num);
          if(q){
            const answers=ans.split(/[,\s]+/).filter(a=>a.match(/^[a-e]$/i));
            q.options.forEach(o=>{o.correct=answers.includes(o.letter.toLowerCase());});
            q.explanation=expl;q.multi=answers.length>1;
          }
        }
        i++;
      }
      continue;
    }
    i++;
  }
  if(curSim&&curSim.questions.length)sims.push(curSim);
  return sims;
}

/* Glossary Parser */
function parseGlossary(md){
  const terms=[];const lines=md.split('\n');
  for(let i=0;i<lines.length;i++){
    if(!lines[i].match(/^\|/)||lines[i].match(/^\|\s*(Term|---)/i))continue;
    const cells=lines[i].split('|').map(c=>c.trim()).filter(Boolean);
    if(cells.length>=2){
      const term=cells[0].replace(/\*\*/g,'').replace(/→ See .*/,'').trim();
      const def=cells[1].replace(/\*\*/g,'').replace(/⚠️/g,'').trim();
      if(term&&def&&!term.match(/^Term$/i))terms.push({term,definition:def});
    }
  }
  return terms;
}

/* Markdown Renderer */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMd(md){
  let html='';const lines=md.split('\n');let i=0,inCode=false,codeBuf='',inTable=false,tableBuf=[];
  while(i<lines.length){
    let L=lines[i];
    if(L.trim().startsWith('```')){
      if(inCode){html+='<pre><code>'+esc(codeBuf.trim())+'</code></pre>';codeBuf='';inCode=false;}
      else{flushT();inCode=true;codeBuf='';}
      i++;continue;
    }
    if(inCode){codeBuf+=L+'\n';i++;continue;}
    if(L.trim().startsWith('|')){if(!inTable)inTable=true;tableBuf.push(L);i++;continue;}
    else if(inTable){flushT();continue;}
    const hm=L.match(/^(#{1,4})\s+(.*)/);if(hm){html+=`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`;i++;continue;}
    if(L.match(/^---+\s*$/)){html+='<hr>';i++;continue;}
    if(L.match(/^>\s/)){let bq='';while(i<lines.length&&lines[i].match(/^>\s?/)){bq+=lines[i].replace(/^>\s?/,'')+'\n';i++;}html+='<blockquote>'+inl(bq.trim())+'</blockquote>';continue;}
    if(L.match(/^[-*]\s/)){html+='<ul>';while(i<lines.length&&lines[i].match(/^[-*]\s/)){
      const ck=lines[i].match(/^[-*]\s\[([xX ])\]\s(.*)/);
      if(ck)html+='<li style="list-style:none;margin-left:-20px"><input type="checkbox"'+(ck[1]!=' '?' checked':'')+' disabled> '+inl(ck[2])+'</li>';
      else html+='<li>'+inl(lines[i].replace(/^[-*]\s/,''))+'</li>';i++;}
      html+='</ul>';continue;}
    if(L.match(/^\d+\.\s/)){html+='<ol>';while(i<lines.length&&lines[i].match(/^\d+\.\s/)){html+='<li>'+inl(lines[i].replace(/^\d+\.\s/,''))+'</li>';i++;}html+='</ol>';continue;}
    if(L.trim()){html+='<p>'+inl(L)+'</p>';}
    i++;
  }
  if(inTable)flushT();
  function flushT(){
    if(!tableBuf.length){inTable=false;return;}
    html+='<table>';const rows=tableBuf.filter(r=>!r.match(/^\|[\s-:|]+\|$/));
    rows.forEach((r,ri)=>{const cells=r.split('|').filter((_,ci,a)=>ci>0&&ci<a.length-1);const tag=ri===0?'th':'td';
      html+='<tr>'+cells.map(c=>`<${tag}>${inl(c.trim())}</${tag}>`).join('')+'</tr>';});
    html+='</table>';tableBuf=[];inTable=false;
  }
  return html;
}
function inl(s){
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/~~(.+?)~~/g,'<del>$1</del>');s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');return s;
}
